<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0c2733">
<title>JSM Trener — Jachtowy Sternik Morski</title>
<style>
:root{
  --bg:#e9eef1;
  --grid:rgba(12,39,51,.045);
  --surface:#ffffff;
  --surface-2:#f4f7f8;
  --ink:#0c2733;
  --muted:#5d6f78;
  --faint:#8aa0a8;
  --line:#d8e1e4;
  --line-strong:#c2cfd3;
  --navy:#0c2733;
  --navy-2:#123847;
  --brand:#0a6573;
  --brand-2:#0d8190;
  --brand-soft:#e3f0f2;
  --accent:#d9892a;
  --accent-2:#b76f1c;
  --accent-soft:#fbeed7;
  --port:#cf4436;
  --port-soft:#fbe6e3;
  --stbd:#2c9457;
  --stbd-soft:#e2f3e9;
  --shadow:0 1px 2px rgba(12,39,51,.06),0 8px 24px rgba(12,39,51,.07);
  --shadow-sm:0 1px 2px rgba(12,39,51,.08);
  --radius:14px;
  --radius-sm:10px;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans);
  color:var(--ink);
  background-color:var(--bg);
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:26px 26px;
  line-height:1.55;
  -webkit-text-size-adjust:100%;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{line-height:1.2;margin:0 0 .4em}
p{margin:0 0 .8em}
a{color:var(--brand);text-decoration:none}
button{font-family:inherit}
:focus-visible{outline:3px solid var(--brand-2);outline-offset:2px;border-radius:8px}

/* ---------- App bar ---------- */
.appbar{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,#0e2c39,#0c2733);
  color:#eaf2f4;
  border-bottom:1px solid #06181f;
  padding:max(env(safe-area-inset-top),10px) 16px 0;
}
.appbar-inner{max-width:1040px;margin:0 auto;display:flex;align-items:center;gap:12px;padding-bottom:8px}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.compass{flex:none;width:34px;height:34px}
.brand-txt{min-width:0}
.brand-txt .ttl{font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:14px;white-space:nowrap}
.brand-txt .sub{font-size:11px;color:#9fb6bd;letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appbar .spacer{flex:1}
.streak{font-size:12px;color:#bcd0d6;border:1px solid #1d4453;border-radius:999px;padding:4px 10px;white-space:nowrap}
.streak b{color:var(--accent)}

/* ---------- Tabs ---------- */
.tabs{max-width:1040px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  appearance:none;background:transparent;border:0;color:#9fb6bd;
  padding:10px 13px 12px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;
  border-bottom:3px solid transparent;display:flex;align-items:center;gap:6px;
}
.tab:hover{color:#dcebef}
.tab[aria-selected="true"]{color:#fff;border-bottom-color:var(--accent)}
.tab .dot{font-size:11px;background:#1d4453;color:#cfe2e7;border-radius:999px;padding:1px 6px;min-width:18px;text-align:center}
.tab[aria-selected="true"] .dot{background:var(--accent);color:#2a1a05}

/* ---------- Layout ---------- */
.wrap{max-width:1040px;margin:0 auto;padding:20px 16px 96px}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
.card+.card{margin-top:14px}
.eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--brand);margin-bottom:6px}
.muted{color:var(--muted)}
.faint{color:var(--faint)}
.small{font-size:13px}
.tiny{font-size:12px}

/* ---------- Buttons ---------- */
.btn{appearance:none;border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);
  padding:11px 16px;border-radius:11px;font-weight:650;font-size:14.5px;cursor:pointer;display:inline-flex;
  align-items:center;justify-content:center;gap:8px;transition:transform .04s,box-shadow .15s,background .15s;box-shadow:var(--shadow-sm)}
.btn:hover{background:var(--surface-2)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--accent);border-color:var(--accent-2);color:#311f06}
.btn.primary:hover{background:#e29a3f}
.btn.brand{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.brand:hover{background:var(--brand-2)}
.btn.ghost{background:transparent;box-shadow:none;border-color:var(--line)}
.btn.sm{padding:7px 11px;font-size:13px;border-radius:9px}
.btn.block{width:100%}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.btnrow{display:flex;gap:10px;flex-wrap:wrap}

/* ---------- Dashboard ---------- */
.hero{background:linear-gradient(135deg,#0c2733,#15485a);color:#eaf2f4;border:0}
.hero h2{color:#fff;font-size:22px}
.hero p{color:#bcd3da;max-width:62ch}
.statrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:14px}
.stat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 14px}
.stat .n{font-size:24px;font-weight:800;color:#fff}
.stat .l{font-size:11.5px;color:#a9c2c9;letter-spacing:.04em;text-transform:uppercase}
.stat .n.amber{color:var(--accent)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:720px){.grid2,.grid3{grid-template-columns:1fr}}

.tile{display:block;text-align:left;width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px;cursor:pointer;transition:transform .06s,box-shadow .15s,border-color .15s}
.tile:hover{transform:translateY(-2px);border-color:var(--brand)}
.tile .ic{font-size:22px;margin-bottom:8px;display:block}
.tile h3{font-size:16px;margin:0 0 3px}
.tile p{font-size:13px;color:var(--muted);margin:0}

/* ---------- Module cards ---------- */
.modlist{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:720px){.modlist{grid-template-columns:1fr}}
.mod{background:var(--surface);border:1px solid var(--line);border-left:5px solid var(--c,var(--brand));border-radius:12px;
  box-shadow:var(--shadow-sm);padding:14px 15px;cursor:pointer;transition:transform .06s,box-shadow .15s}
.mod:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.mod h3{font-size:15.5px;margin:0 0 2px;display:flex;align-items:center;gap:8px}
.mod .meta{font-size:12px;color:var(--muted)}
.mod .bar{height:5px;background:var(--surface-2);border-radius:99px;margin-top:9px;overflow:hidden}
.mod .bar>i{display:block;height:100%;background:var(--c,var(--brand));width:0}
.chip{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--brand-soft);color:var(--brand)}

/* ---------- Study reader ---------- */
.reader h2{font-size:21px}
.reader h3{font-size:16.5px;color:var(--brand);margin-top:1.3em;border-top:1px solid var(--line);padding-top:.9em}
.reader h3:first-of-type{border-top:0;padding-top:0;margin-top:.6em}
.reader h4{font-size:14.5px;margin-top:1.1em}
.reader ul{margin:.2em 0 1em;padding-left:1.1em}
.reader li{margin:.28em 0}
.reader li::marker{color:var(--brand-2)}
.reader p{font-size:15px}
.reader b,.reader strong{color:#08303c}
.kbd{font-family:var(--mono);font-size:13px;background:var(--navy);color:#dbeef1;padding:1px 7px;border-radius:6px}
.formula{font-family:var(--mono);background:var(--navy);color:#e7f4f6;border-radius:10px;padding:12px 14px;font-size:14px;
  overflow-x:auto;margin:.4em 0 1em}
.formula .hl{color:var(--accent)}
.callout{border:1px solid var(--line);border-left:4px solid var(--accent);background:var(--accent-soft);border-radius:10px;padding:11px 13px;margin:.6em 0 1em;font-size:14px}
.callout.warn{border-left-color:var(--port);background:var(--port-soft)}
.callout.ok{border-left-color:var(--stbd);background:var(--stbd-soft)}
.callout .ct{font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:3px}

table.tbl{width:100%;border-collapse:collapse;font-size:13.5px;margin:.3em 0 1em;display:block;overflow-x:auto}
table.tbl th,table.tbl td{border:1px solid var(--line);padding:6px 9px;text-align:left;vertical-align:top}
table.tbl th{background:var(--surface-2);font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
table.tbl tr:nth-child(even) td{background:#fafcfc}

.portstbd{display:flex;gap:10px;flex-wrap:wrap;margin:.4em 0 1em}
.ps{flex:1;min-width:160px;border-radius:10px;padding:10px 12px;font-size:13.5px;border:1px solid}
.ps.p{background:var(--port-soft);border-color:#f0c6c0}
.ps.s{background:var(--stbd-soft);border-color:#bfe3cd}
.ps b{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.06em}
.ps.p b{color:#a3372c}.ps.s b{color:#1f7644}

/* ---------- Quiz ---------- */
.quizmeta{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.progbar{height:7px;background:var(--surface-2);border:1px solid var(--line);border-radius:99px;overflow:hidden;flex:1;min-width:120px}
.progbar>i{display:block;height:100%;background:var(--brand);width:0;transition:width .25s}
.qcat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--brand)}
.qtext{font-size:17px;font-weight:650;margin:6px 0 14px;line-height:1.4}
.opt{display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;background:var(--surface);
  border:1.5px solid var(--line-strong);border-radius:12px;padding:13px 14px;margin-bottom:10px;cursor:pointer;
  font-size:15px;transition:border-color .12s,background .12s,transform .04s}
.opt:hover{border-color:var(--brand)}
.opt:active{transform:translateY(1px)}
.opt .lab{flex:none;width:25px;height:25px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line-strong);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--muted)}
.opt.correct{border-color:var(--stbd);background:var(--stbd-soft)}
.opt.correct .lab{background:var(--stbd);border-color:var(--stbd);color:#fff}
.opt.wrong{border-color:var(--port);background:var(--port-soft)}
.opt.wrong .lab{background:var(--port);border-color:var(--port);color:#fff}
.opt[disabled]{cursor:default}
.opt.dim{opacity:.62}
.explain{border-radius:11px;padding:12px 14px;font-size:14px;margin:4px 0 6px;border:1px solid var(--line);background:var(--surface-2);display:none}
.explain.show{display:block;animation:fade .2s}
.explain .verdict{font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.explain.good{background:var(--stbd-soft);border-color:#bfe3cd}
.explain.good .verdict{color:#1f7644}
.explain.bad{background:var(--port-soft);border-color:#f0c6c0}
.explain.bad .verdict{color:#a3372c}

/* selectors / options for test setup */
.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
@media(max-width:560px){.checks{grid-template-columns:1fr}}
.chk{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:10px;padding:9px 12px;cursor:pointer;background:var(--surface);font-size:14px}
.chk input{width:18px;height:18px;accent-color:var(--brand);flex:none}
.chk .ct{margin-left:auto;font-size:12px;color:var(--faint)}
.seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:10px;overflow:hidden;background:var(--surface)}
.seg button{border:0;background:transparent;padding:8px 14px;font-weight:650;font-size:14px;cursor:pointer;color:var(--muted)}
.seg button[aria-pressed="true"]{background:var(--brand);color:#fff}

/* exam */
.examtimer{font-family:var(--mono);font-weight:800;font-size:18px;background:var(--navy);color:#eaf6f7;border-radius:10px;padding:6px 12px;letter-spacing:.04em}
.examtimer.warn{background:var(--port);color:#fff;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.65}}
.examgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(34px,1fr));gap:6px;margin-top:8px}
.examnav{width:100%;aspect-ratio:1;border:1px solid var(--line-strong);background:var(--surface);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted)}
.examnav.answered{background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}
.examnav.flag{outline:2px solid var(--accent);outline-offset:-2px}
.examnav.cur{background:var(--brand);color:#fff;border-color:var(--brand)}

.scorebig{font-size:46px;font-weight:800;line-height:1}
.ring{--p:0;width:128px;height:128px;border-radius:50%;display:grid;place-items:center;flex:none;
  background:conic-gradient(var(--rc,var(--brand)) calc(var(--p)*1%),var(--surface-2) 0)}
.ring .inner{width:100px;height:100px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center}
.verdict-banner{border-radius:12px;padding:14px 16px;font-weight:700;margin-bottom:14px}
.verdict-banner.pass{background:var(--stbd-soft);color:#1c6e41;border:1px solid #bfe3cd}
.verdict-banner.fail{background:var(--port-soft);color:#9c3327;border:1px solid #f0c6c0}
.catbar{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
.catbar .nm{width:150px;flex:none;color:var(--muted)}
.catbar .track{flex:1;height:9px;background:var(--surface-2);border-radius:99px;overflow:hidden}
.catbar .track>i{display:block;height:100%}
.catbar .vv{width:46px;text-align:right;font-variant-numeric:tabular-nums;flex:none;font-weight:700}

/* ---------- Flashcards ---------- */
.flashstage{perspective:1400px;margin:6px 0 12px}
.flash{position:relative;width:100%;min-height:260px;cursor:pointer;transform-style:preserve-3d;transition:transform .5s}
.flash.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;padding:24px;display:flex;flex-direction:column;
  justify-content:center;box-shadow:var(--shadow);border:1px solid var(--line)}
.face .tagline{position:absolute;top:14px;left:18px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.face .hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:11.5px;color:var(--faint)}
.front{background:linear-gradient(140deg,#0c2733,#16495b);color:#fff}
.front .tagline{color:#8fb4bd}
.front .q{font-size:22px;font-weight:750;text-align:center}
.front .hint{color:#7fa0a9}
.back{background:var(--surface);transform:rotateY(180deg)}
.back .tagline{color:var(--brand)}
.back .a{font-size:16px;line-height:1.5}
.back .a b{color:#08303c}
.flashctrl{display:flex;align-items:center;justify-content:space-between;gap:10px}
.counter{font-variant-numeric:tabular-nums;font-weight:700;color:var(--muted);font-size:14px}

/* ---------- Search ---------- */
.searchbox{display:flex;gap:8px;align-items:center;background:var(--surface);border:1.5px solid var(--line-strong);border-radius:12px;padding:4px 4px 4px 14px;box-shadow:var(--shadow-sm)}
.searchbox input{border:0;outline:0;flex:1;font-size:16px;padding:10px 0;background:transparent;color:var(--ink)}
.result{border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:10px;background:var(--surface)}
.result .rtype{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--brand)}
.result mark{background:var(--accent-soft);color:#7a4d10;padding:0 2px;border-radius:3px}

/* ---------- Practical ---------- */
.proc{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;background:var(--surface);overflow:hidden;box-shadow:var(--shadow-sm)}
.proc>summary{padding:13px 15px;cursor:pointer;font-weight:700;font-size:15px;display:flex;align-items:center;gap:10px;list-style:none}
.proc>summary::-webkit-details-marker{display:none}
.proc>summary .tw{margin-left:auto;font-size:12px;color:var(--faint);font-weight:600}
.proc>summary .caret{transition:transform .2s;color:var(--brand)}
.proc[open]>summary .caret{transform:rotate(90deg)}
.proc .body{padding:0 15px 14px}
.step{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-top:1px dashed var(--line)}
.step input{width:20px;height:20px;margin-top:1px;accent-color:var(--stbd);flex:none}
.step .t{font-size:14.5px}
.step.done .t{color:var(--faint);text-decoration:line-through}
.selfrate{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap;font-size:13px}
.rate{border:1px solid var(--line-strong);background:var(--surface);border-radius:999px;padding:6px 13px;font-size:13px;cursor:pointer;font-weight:650}
.rate[data-on="1"]{background:var(--port);color:#fff;border-color:var(--port)}
.rate[data-on="2"]{background:var(--accent);color:#2a1a05;border-color:var(--accent-2)}
.rate[data-on="3"]{background:var(--stbd);color:#fff;border-color:var(--stbd)}

/* cheat sheet */
.sheetcols{columns:2;column-gap:16px}
@media(max-width:720px){.sheetcols{columns:1}}
.sheet{break-inside:avoid;border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:14px;background:var(--surface)}
.sheet h4{margin:0 0 6px;font-size:14px;color:var(--brand);border-bottom:1px solid var(--line);padding-bottom:5px}
.sheet ul{margin:0;padding-left:1.05em;font-size:13.5px}
.sheet li{margin:.3em 0}

.empty{text-align:center;color:var(--muted);padding:34px 16px}
.empty .ic{font-size:34px;display:block;margin-bottom:8px;opacity:.7}
.backlink{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:650;color:var(--brand);cursor:pointer;margin-bottom:12px}
hr.sep{border:0;border-top:1px solid var(--line);margin:16px 0}
.tagline-note{font-size:12px;color:var(--faint);text-align:center;margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
details.legal summary{cursor:pointer;font-weight:700;color:var(--brand);font-size:13.5px}
details.legal{font-size:13px;color:var(--muted)}
.kref{font-family:var(--mono);font-size:12.5px;color:var(--accent-2)}

/* ============================================================
   SUPLEMENT — style dla klas używanych przez silnik aplikacji
   (zbudowane na istniejących zmiennych; nadpisują kolizje)
   ============================================================ */
.hint{font-size:12.5px;color:var(--faint)}
.vh{font-size:22px;margin:0 0 4px}
.vsub{color:var(--muted);font-size:14px;max-width:72ch;margin:0 0 14px}
.sec{font-size:16px;margin:22px 0 10px;color:var(--ink);font-weight:750}
.btn.big{padding:14px 20px;font-size:16px;border-radius:12px}
.mini{appearance:none;border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:5px 10px;font-size:12.5px;font-weight:650;cursor:pointer;color:var(--muted)}
.mini:hover{background:var(--surface-2)}
.startrow{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:14px}

/* Pulpit / hero */
.hero{padding:20px 22px;border-radius:var(--radius);box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:8px}
.hero h1{color:#fff;font-size:25px;margin:0 0 6px}
.herotext{min-width:240px;flex:1}
.herotext p{color:#bcd3da;margin:0;max-width:54ch}
.herostats{display:grid;grid-template-columns:repeat(2,minmax(104px,1fr));gap:9px;min-width:230px}
.hero .stat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:10px 12px;text-align:center}
.stat .snum{font-size:23px;font-weight:800;color:#fff;line-height:1.1}
.stat .slab{font-size:10px;color:#a9c2c9;text-transform:uppercase;letter-spacing:.04em}
.stat.bad .snum{color:#ff9d8f}

/* Kafelki trybów */
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin:6px 0 4px}
.tile .ti{font-size:24px;display:block;margin-bottom:6px}
.tile .tt{font-weight:750;font-size:16px;display:block}
.tile .td{font-size:12.5px;color:var(--muted);display:block;margin-top:2px}

<h3>Typy ożaglowania (omasztowania)</h3>
<p>Większość jachtów czarterowych to jednomasztowe <b>slupy</b> (jeden żagiel przedni) lub <b>slutry/kutry</b> (dodatkowy sztag wewnętrzny, dwa żagle przednie). Inne: <b>kecz</b> i <b>jol</b> (drugi, niższy maszt — bezan), <b>szkuner</b> (przedni maszt niższy lub równy).</p>
<ul>
<li><b>Grot</b> — żagiel główny na maszcie i bomie (rolowany lub refowany).</li>
<li><b>Fok</b> — żagiel przedni; <b>genua</b> — duży fok zachodzący za wanty; <b>fok sztormowy</b> — mały, z grubej tkaniny.</li>
<li><b>Trajsel</b> — grot sztormowy z grubej tkaniny (stawiany zamiast grota w sztormie).</li>

<h3>Takielunek</h3>
<ul>
<li><b>Takielunek stały</b> — sztagi i wanty (liny utrzymujące maszt). Przy przeglądzie sprawdzaj: brak pękniętych drutów i korozji, zabezpieczenie ściągaczy przed rozkręceniem, zawleczki na sworzniach, napięcie lin.</li>
<li><b>Takielunek ruchomy</b> — fały (stawianie żagli), szoty (trym), brasy/kontrabrasy (spinaker).</li>
<li><b>Topenanta</b> — lina podtrzymująca bom (zamocowana do noku bomu). <b>Obciągacz bomu (kicking)</b> — ściąga bom w dół.</li>
<li><b>Lazy Jack</b> — system linek maszt–bom prowadzących grot przy zrzucaniu (rola topenanty + ułatwia klar; bywa łączony z pokrowcem).</li>

<h3>Instalacja elektryczna</h3>
<ul>
<li>Źródło: akumulator <b>12 V</b>; doładowanie z alternatora silnika lub paneli słonecznych. Często rozdziela się akumulator <b>rozruchowy</b> i <b>serwisowe</b> (nawigacja/oświetlenie).</li>

</ul>
<h3>Instalacja gazowa (propan-butan)</h3>
<ul>
<li>Gaz <b>cięższy od powietrza</b> — w razie nieszczelności gromadzi się w zęzie (dolne partie). Tworzy mieszankę wybuchową.</li>
<li>Butlę montuje się <b>poza kabiną</b>, w skrzyni dostępnej z zewnątrz, z otworami wentylacyjnymi w dolnej części.</li>
<li><b>Kolejność:</b> przy zapalaniu najpierw otwórz zawór na butli, potem przy kuchence; przy gaszeniu — najpierw zakręć butlę, a zawór przy kuchence dopiero gdy zgaśnie płomień (wypalenie gazu z węża).</li>
<li>Butle 3 kg — legalizacja co 5 lat. Szczelność nowej butli sprawdza się np. wodą mydlaną.</li>

<h3>Silnik — obsługa i kontrola</h3>
<ul>
<li><b>Przed uruchomieniem:</b> poziom oleju, poziom płynu chłodzącego, otwarcie zaworu wody zaburtowej (dla "mokrego" wydechu).</li>

<li>Długość łańcucha/liny dobiera się do głębokości; sam łańcuch 25 m dla dużego jachtu bywa za krótki — patrz moduł „Manewry” (wybieranie łańcucha).</li>
<li>Krętlik (swivel) między łańcuchem a kotwicą zapobiega skręcaniu łańcucha.</li>
</ul>`,

teoria:`
<h3>Rodzaje wiatru</h3>
<ul>
<li><b>Wiatr rzeczywisty (WR)</b> — wynika z pogody i ukształtowania terenu.</li>
<li><b>Wiatr własny (WW)</b> — pozorny ruch powietrza wywołany ruchem jachtu, przeciwny do kierunku i równy jego prędkości.</li>
<li><b>Wiatr pozorny (WP)</b> — wypadkowa WR i WW; to on działa na żagle i jest odczuwany na pokładzie. Pokazuje go <b>wimpel</b> na topie masztu. Kursy określamy względem wiatru pozornego.</li>
</ul>
<div class="callout"><span class="ct">Zapamiętaj</span>Wiatr pozorny (poza fordewindem) jest zawsze <b>ostrzejszy</b> (bardziej od dziobu) i zwykle silniejszy od rzeczywistego; od półwiatru do bajdewindu jego siła rośnie względem WR.</div>
<h3>Kursy względem wiatru</h3>
<table class="tbl"><tr><th>Kurs</th><th>Skąd wieje wiatr</th><th>Grupa</th></tr>
<tr><td><b>Bajdewind</b></td><td>od kąta martwego do trawersu</td><td>ostry</td></tr>
<tr><td><b>Półwiatr</b></td><td>z trawersu (prostopadle)</td><td>ostry</td></tr>
<tr><td><b>Baksztag</b></td><td>z tyłu między trawersem a rufą</td><td>pełny</td></tr>
<tr><td><b>Fordewind</b></td><td>prosto od rufy</td><td>pełny</td></tr></table>
<ul>
<li><b>Halsy:</b> prawy hals = wiatr z prawej burty; lewy hals = wiatr z lewej. Od halsu zależy m.in. pierwszeństwo drogi.</li>
<li><b>Ostrzenie</b> — zmiana kursu na ostrzejszy (ku wiatrowi); <b>odpadanie</b> — na pełniejszy (od wiatru).</li>
<li>Burta <b>nawietrzna</b> — od strony wiatru; <b>zawietrzna</b> — schowana za wiatrem.</li>
</ul>
<h3>Siły działające na jacht</h3>
<p><b>Nad wodą</b> — siła aerodynamiczna na żaglu rozkłada się na: <b>siłę ciągu</b> (równoległą do diametralnej — napędza) i <b>siłę dryfu/przechylającą</b> (prostopadłą — przechyla i znosi). Cel trymu: maksymalny ciąg, minimalne przechylanie. Żagiel ustawia się <b>blisko granicy łopotu</b> — wprowadź w lekki łopot i wybieraj szot aż łopot zniknie.</p>
<p><b>Pod wodą</b> — siła hydrodynamiczna rozkłada się na <b>opór wzdłużny</b> (przeciw ruchowi) i <b>opór boczny</b> (przeciwdziała dryfowi). Punkty przyłożenia: <b>środek ożaglowania (SO)</b> i <b>środek oporu bocznego (SBO)</b>.</p>
<h3>Równowaga: nawietrzność / zawietrzność</h3>
<div class="portstbd">
<div class="ps s"><b>Jacht nawietrzny</b>SBO bliżej dziobu niż SO. Sam <b>ostrzy</b> (dąży do wiatru). Daje to ster — przy puszczeniu steru jacht staje w łopocie (bezpieczne).</div>
<div class="ps p"><b>Jacht zawietrzny</b>SO bliżej dziobu niż SBO. Sam <b>odpada</b> od wiatru. Niebezpieczne — utrudnia stawanie w łopot.</div>
</div>
<ul>
<li><b>Więcej nawietrzności:</b> wybierz/dostaw żagle tylne, zrzuć/zarefuj przednie, pochyl maszt ku rufie.</li>
<li><b>Więcej zawietrzności:</b> wybierz/dostaw żagle przednie, zrzuć/zarefuj tylne, pochyl maszt ku dziobowi.</li>
</ul>
<h3>Stateczność</h3>
<p>Stateczność to zdolność powrotu do pionu po przechyle. Na jachcie morskim daje ją głównie <b>balast w kilu</b> (środek ciężkości nisko). Reefuj zawczasu — zmniejsza powierzchnia żagli przy silnym wietrze zmniejsza przechył i moment przewracający. Przy podmuchach lepiej <b>odpuścić szot grota</b> niż dopuścić do nadmiernego przechyłu.</p>`,

nawigacja:`
<h3>Współrzędne i jednostki</h3>
<ul>
<li><b>Szerokość geograficzna φ</b> — od równika ku biegunom, N (+) / S (−), 0°–90°. <b>Długość λ</b> — od południka Greenwich, E (+) / W (−), 0°–180°.</li>
<li><b>Mila morska (Mm) = 1852 m</b> = długość 1′ łuku południka. <b>Kabel = 0,1 Mm = 185,2 m</b>.</li>
<li>1′ <b>różnicy szerokości</b> zawsze = 1 Mm. Dlatego odległości na mapie Merkatora odmierzamy z <b>bocznej ramki</b> (skala szerokości), na wysokości swojego φ.</li>
</ul>
<div class="callout"><span class="ct">Mapa Merkatora</span>Wiernokątna, ale <b>nie wiernoodległościowa</b> — skala rośnie z szerokością. Nigdy nie mierz odległości na dolnej (długościowej) ramce.</div>
<h3>Deklinacja, dewiacja, całkowita poprawka</h3>
<ul>
<li><b>Deklinacja (d)</b> — kąt między północą rzeczywistą a magnetyczną. Zależy od miejsca i zmienia się w czasie (podana na mapie + zmiana roczna). E = "+", W = "−".</li>
<li><b>Dewiacja (δ)</b> — odchylenie igły przez pole magnetyczne <b>samego jachtu</b>; zależy od <b>kursu</b> (tabela dewiacji co 5°–10°). E/prawo = "+", W/lewo = "−".</li>
<li><b>Całkowita poprawka:</b></li>
</ul>
<div class="formula">cp = d + <span class="hl">&delta;</span>      (deklinacja + dewiacja)</div>
<h3>Kursy</h3>
<ul>
<li><b>KK</b> — kurs kompasowy (odczyt z kompasu). <b>KM</b> — magnetyczny. <b>KR</b> — rzeczywisty. <b>KDw</b> — kąt drogi po wodzie. <b>KDd</b> — kąt drogi nad dnem.</li>
</ul>
<div class="formula">KM  = KK + <span class="hl">&delta;</span>
KR  = KK + d + <span class="hl">&delta;</span>            = KK + cp
KDw = KK + d + <span class="hl">&delta;</span> + pw       (pw = dryf / poprawka na wiatr)
KDd = KDw + pp                  (pp = znos / poprawka na prąd)</div>
<div class="callout"><span class="ct">Znaki poprawki na wiatr (dryf, pw)</span>Wiatr z <b>prawej</b> burty → dryf <b>ujemny (−)</b>. Wiatr z <b>lewej</b> burty → dryf <b>dodatni (+)</b>. (Jacht jest spychany na zawietrzną.)</div>
<p>Bez prądu i bez dryfu KR = KDd. Jeśli nie ma prądu, ale wieje wiatr, trzeba jeszcze uwzględnić dryf — sam KR nie równa się KDd.</p>
<h3>Namiary i kąt kursowy</h3>
<ul>
<li><b>Namiar (NR/NM/NK)</b> — kierunek od obserwatora do obiektu. <b>NR = NK + d + δ</b>; <b>NM = NK + d</b>.</li>
<li><b>Kąt kursowy &lt;K</b> — od dziobu w prawo do obiektu. <b>Trawers</b> = 90° lub 270°.</li>
<li>Zależność: <b>NAMIAR = KURS + KĄT KURSOWY</b>. Gdy wynik &gt; 360°, odejmij 360°.</li>
</ul>
<h3>Pozycja i zliczanie</h3>
<ul>
<li><b>Linia pozycyjna</b>: namiar, nabieżnik, izobata, krąg z kąta poziomego. Najdokładniejsza pozycja, gdy linie przecinają się pod kątem <b>30°–150°</b> (idealnie 90°).</li>
<li><b>Zliczanie graficzne (martwa nawigacja)</b>: wykreślasz na mapie <b>kąt drogi nad dnem (KDd)</b> i odmierzasz przebyte odległości.</li>
<li><b>GPS</b> pokazuje prędkość i kierunek <b>względem dna</b> (SOG/COG). <b>Echosonda</b> — ustal, od czego mierzy głębokość (od kila, linii wodnej czy czujnika).</li>
<li><b>Log burtowy</b>: prędkość = długość jachtu / czas przepłynięcia obiektu wzdłuż burty.</li>
</ul>
<div class="callout ok"><span class="ct">Przykład — log burtowy</span>Jacht 12 m, przedmiot mija burtę w 6 s → v = 12/6 = 2 m/s ≈ <b>4 węzły</b> (×1,94).</div>`,

locja:`
<h3>System IALA — Region A (Europa, Bałtyk)</h3>
<p>Połączenie systemu <b>bocznego</b> i <b>kardynalnego</b>. Pięć rodzajów znaków: boczne, kardynalne, odosobnionego niebezpieczeństwa, bezpiecznej wody, specjalne. Kierunek toru liczy się <b>od morza w stronę portu</b>.</p>
<div class="portstbd">
<div class="ps p"><b>Lewa strona toru</b>Kolor <b>czerwony</b>, kształt walcowaty (can), znak szczytowy czerwony walec, światło <b>czerwone</b>.</div>
<div class="ps s"><b>Prawa strona toru</b>Kolor <b>zielony</b>, kształt stożkowy, znak szczytowy zielony stożek wierzchołkiem w górę, światło <b>zielone</b>.</div>
</div>
<div class="callout warn"><span class="ct">Uwaga — Region A ≠ Region B</span>W Regionie A wchodząc z morza masz <b>czerwone po lewej, zielone po prawej</b>. W Regionie B (Ameryki) jest odwrotnie ("red right returning"). Oznakowanie boczne różni się między regionami, <b>kardynalne jest takie samo</b>.</div>
<h3>Znaki kardynalne</h3>
<p>Wskazują, po której stronie jest <b>najgłębsza/bezpieczna woda</b> — od strony nazwy znaku. Żółto-czarne, znak szczytowy = dwa czarne stożki. Światło białe, szybkie (VQ/Q).</p>
<table class="tbl"><tr><th>Znak</th><th>Stożki</th><th>Czarny pas</th><th>Światło (białe)</th></tr>
<tr><td><b>N</b></td><td>oba w górę ▲▲</td><td>u góry</td><td>VQ lub Q (ciągłe)</td></tr>
<tr><td><b>E</b></td><td>podstawami do siebie ◇</td><td>góra i dół</td><td>VQ(3) / Q(3)</td></tr>
<tr><td><b>S</b></td><td>oba w dół ▼▼</td><td>u dołu</td><td>VQ(6)+LFl / Q(6)+LFl</td></tr>
<tr><td><b>W</b></td><td>wierzchołkami do siebie (kielich)</td><td>w środku</td><td>VQ(9) / Q(9)</td></tr></table>
<h3>Pozostałe znaki</h3>
<ul>
<li><b>Odosobnione niebezpieczeństwo</b> — nad przeszkodą, woda dookoła żeglowna. Czarny z czerwonymi pasami, szczyt = <b>dwie czarne kule</b>, światło B(2) białe.</li>
<li><b>Bezpiecznej wody</b> (oś toru, nabieżnik wejściowy) — pionowe pasy <b>czerwono-białe</b>, szczyt = jedna czerwona kula, światło białe Iso / Oc / LFl 10s / Morse "A". Mijać dowolną stroną.</li>
<li><b>Specjalny</b> — żółty, znak szczytowy żółty <b>X</b>, światło żółte (akweny specjalne, kotwicowiska, sieci).</li>
<li><b>Tymczasowa pława wrakowa</b> — niebiesko-żółte pasy, światło na przemian niebieskie/żółte.</li>
</ul>
<h3>Mapy i publikacje</h3>
<ul>
<li>W Polsce mapy wydaje <b>Biuro Hydrograficzne Marynarki Wojennej (Gdynia)</b>; największy wydawca — <b>Admiralicja Brytyjska</b>.</li>
<li>Skale: <b>generalne</b> (1:1 000 000…), <b>brzegowe</b> (1:100 000–200 000), <b>plany</b> (1:10 000–50 000) — im trudniejszy akwen, tym większa skala.</li>
<li>Mapa musi być <b>aktualna</b> — poprawki w cotygodniowych „Wiadomościach Żeglarskich” (ang. <i>Notices to Mariners</i>).</li>
<li><b>Locje</b> — szczegółowy opis wybrzeży. <b>Spis świateł</b> — charakterystyki latarni (podaje <b>zasięg nominalny</b> = przy widzialności met. dokładnie 10 Mm). <b>ALRS</b> — radiostacje, pilotaż, operacje portowe. <b>Tablice/atlasy pływów i prądów</b>.</li>
<li>Na mapie: głębokości i charakter dna (skróty literowe, np. S=piasek, M=muł), izobaty; <b>wysokości suszące podkreślone</b>. Kolorów pław na mapie nie ma — jest tylko znak szczytowy.</li>
</ul>
<h3>Pływy (podstawy)</h3>
<ul>
<li><b>Zero mapy</b> na wodach pływowych = <b>LAT</b> (najniższy pływ astronomiczny) — głębokości na mapie to minimum, realnie bywa głębiej.</li>
<li><b>Skok pływu</b> = różnica między wysoką (HW) a niską wodą (LW). Pływ <b>syzygijny</b> (spring) — największy skok; <b>kwadraturowy</b> (neap) — najmniejszy.</li>
<li>Tablice pływów podają momenty i wysokości HW/LW, krzywą pływu, strefę czasu portu. Porty „secondary” = różnice czasu i wysokości względem portu głównego.</li>
<li><b>Przyboj/fala w wejściu</b> jest większa przy <b>odpływie</b> i wietrze od morza (prąd przeciw fali).</li>
</ul>`,

meteo:`
<h3>Ciśnienie i układy baryczne</h3>
<ul>
<li>Ciśnienie podaje się w <b>hektopaskalach (hPa)</b>. Wiatr to ruch powietrza z wyższego ku niższemu ciśnieniu; im większy <b>gradient</b> (różnica na odcinku), tym silniejszy wiatr.</li>
<li><b>Izobary</b> — linie jednakowego ciśnienia.</li>
<li><b>Niż</b> — ciśnienie maleje ku środkowi. <b>Wyż</b> — rośnie ku środkowi.</li>
</ul>
<div class="callout"><span class="ct">Cyrkulacja (półkula N)</span>Wiatr wieje niemal wzdłuż izobar: wokół <b>niżu — przeciwnie</b> do wskazówek zegara (lekko do środka), wokół <b>wyżu — zgodnie</b> z zegarem (lekko na zewnątrz). Przy ziemi wiatr w niżu odchyla się o ~20–40° do środka.</div>
<div class="callout ok"><span class="ct">Reguła Buys-Ballota (półkula N)</span>Stań tyłem do wiatru — <b>niż masz po lewej ręce</b> (lekko z przodu). Stąd na fordewindzie w niżu jego centrum jest ~2 rumby przed lewym trawersem.</div>
<h3>Pogoda w niżu vs wyżu</h3>
<div class="portstbd">
<div class="ps p"><b>Niż</b>Duże zachmurzenie, opady, silny/porywisty wiatr, fronty. Nagły spadek ciśnienia (np. 3 hPa/h) = zbliża się niż i silny wiatr.</div>
<div class="ps s"><b>Wyż</b>Małe zachmurzenie lub bezchmurnie, brak opadów, słabszy wiatr, stabilna pogoda.</div>
</div>
<h3>Fronty atmosferyczne</h3>
<table class="tbl"><tr><th>Front</th><th>Mechanizm</th><th>Pogoda</th></tr>
<tr><td><b>Ciepły</b></td><td>ciepłe wślizguje się nad chłodne</td><td>chmury warstwowe (Ci→Cs→As→Ns), ciągły deszcz, <b>bez silnego wiatru</b>, powolny</td></tr>
<tr><td><b>Chłodny</b></td><td>chłodne wbija się klinem pod ciepłe</td><td><b>Cb</b>, szkwały, przelotne ulewy, burze, wiatr przeskakuje SW→NW, porywisty; po nim ciśnienie szybko rośnie</td></tr>
<tr><td><b>Zokludowany</b></td><td>chłodny dogania ciepły (okluzja)</td><td>cechy obu; ciepłe powietrze wyparte w górę</td></tr></table>
<p>Front chłodny jest szybszy (~20–30 kn) niż ciepły (~10–20 kn).</p>
<h3>Skala Beauforta (B)</h3>
<table class="tbl"><tr><th>B</th><th>Nazwa</th><th>m/s</th><th>B</th><th>Nazwa</th><th>m/s</th></tr>
<tr><td>0</td><td>Cisza</td><td>0–0,2</td><td>7</td><td>b. silny</td><td>13,9–17,1</td></tr>
<tr><td>1</td><td>Powiew</td><td>0,3–1,5</td><td>8</td><td>gwałtowny</td><td>17,2–20,7</td></tr>
<tr><td>2</td><td>stały</td><td>1,6–3,3</td><td>9</td><td>wichura</td><td>20,8–24,4</td></tr>
<tr><td>3</td><td>łagodny</td><td>3,4–5,4</td><td>10</td><td>silna wich.</td><td>24,5–28,4</td></tr>
<tr><td>4</td><td>umiark.</td><td>5,5–7,9</td><td>11</td><td>gwałt. wich.</td><td>28,5–32,6</td></tr>
<tr><td>5</td><td>dość silny</td><td>8,0–10,7</td><td>12</td><td>huragan</td><td>&gt;32,6</td></tr>
<tr><td>6</td><td>silny</td><td>10,8–13,8</td><td colspan="3"></td></tr></table>
<p>Środki asekuracji (pas bezp.) zakłada się w dzień zwykle od <b>4°B</b> wzwyż; szkwały i burze to objawy frontu chłodnego.</p>
<h3>Chmury</h3>
<ul>
<li>Niskie: <b>St, Sc, Ns</b>. Średnie: <b>As, Ac</b>. Wysokie: <b>Ci, Cs, Cc</b>. Pionowo rozbudowane: <b>Cu, Cb</b> (Cb = chmura burzowa).</li>
</ul>
<h3>Bryzy</h3>
<div class="portstbd">
<div class="ps s"><b>Bryza dzienna (morska)</b>W dzień ląd cieplejszy → niż nad lądem → wiatr <b>od morza ku lądowi</b>.</div>
<div class="ps p"><b>Bryza nocna (lądowa)</b>W nocy woda cieplejsza → niż nad wodą → wiatr <b>od lądu ku wodzie</b>.</div>
</div>
<h3>Wilgotność i mgła</h3>
<ul>
<li><b>Wilgotność względna</b> w %. Przy temperaturze <b>punktu rosy wynosi 100%</b> (para się skrapla → mgła, rosa). Mierzy ją <b>higrometr</b>.</li>
<li>Przykład: 5 g pary/m³ przy nasyceniu 10 g/m³ → wilgotność = 50%.</li>
</ul>
<h3>Prognozy na morzu</h3>
<ul>
<li>Schemat komunikatu radiowego: <b>ostrzeżenia → sytuacja baryczna → prognoza wiatru (siła i kierunek), stan morza, widzialność, opady → prognoza orientacyjna na kolejny okres</b>.</li>
<li><b>NAVTEX</b> — automatyczny odbiór ostrzeżeń i prognoz (ustawiasz region i typ komunikatów). <b>GRIB</b> — pliki z mapami parametrów na kilka dni (potrzeba urządzenia do pobrania + komputer; w porcie wystarczy internet).</li>
<li>„Wiatr SW 3–4” = wiatr z południowego zachodu, umiarkowany, <b>3–4°B</b>. Siłę podaje się najczęściej w m/s lub °B (zależnie od kraju).</li>
<li><b>Termometr</b> umieszczaj w cieniu, z dala od źródeł ciepła; <b>barometr</b> i jego tendencja to najważniejsze narzędzie krótkoterminowe.</li>
</ul>`,

przepisy:`
<h3>MPZZM / COLREGs — istota</h3>
<p><b>MPZZM</b> (Międzynarodowe Przepisy o Zapobieganiu Zderzeniom na Morzu, ang. COLREGs) to <b>41 prawideł</b>. Odpowiedzialność za uniknięcie zderzenia spoczywa na <b>każdym</b> statku. Działanie antykolizyjne ma być <b>zdecydowane, wykonane zawczasu i wystarczające</b>.</p>
<div class="callout"><span class="ct">Ryzyko zderzenia</span>Jeśli <b>namiar na drugi statek nie zmienia się</b>, a odległość maleje — istnieje ryzyko kolizji. W razie wątpliwości <b>zakładaj, że ryzyko istnieje</b> i działaj.</div>
<h3>Prawo drogi — statki o napędzie mechanicznym</h3>
<ul>
<li><b>Wprost na siebie (head-on):</b> oba odbijają <b>w prawo</b> (mijają się lewymi burtami).</li>
<li><b>Kursy przecinające (crossing):</b> ustępuje ten, który ma drugi statek po swojej <b>prawej burcie</b> (i nie przecina mu kursu przed dziobem).</li>
<li><b>Wyprzedzanie:</b> <b>wyprzedzający ustępuje</b> (dotyczy wszystkich statków); wyprzedzany utrzymuje kurs i prędkość.</li>
</ul>
<h3>Prawo drogi — statki żaglowe (Praw. 12)</h3>
<div class="portstbd">
<div class="ps p"><b>Różne halsy</b>Ustępuje jacht na <b>lewym halsie</b> (pierwszeństwo ma prawy hals).</div>
<div class="ps s"><b>Ten sam hals</b>Ustępuje jacht <b>nawietrzny</b> (pierwszeństwo ma zawietrzny).</div>
</div>
<p>Gdy na lewym halsie widzisz jacht po nawietrznej i nie wiesz, na jakim jest halsie — ustąp.</p>
<h3>Hierarchia uprzywilejowania (kto komu ustępuje)</h3>
<p>Od najbardziej uprzywilejowanego (każdy niżej ustępuje każdemu wyżej):</p>
<ul>
<li>1. statek <b>nieodpowiadający za swoje ruchy</b> (awaria),</li>
<li>2. statek o <b>ograniczonej zdolności manewrowej</b>,</li>
<li>3. statek <b>ograniczony swoim zanurzeniem</b>,</li>
<li>4. statek <b>zajęty połowem</b>,</li>
<li>5. statek <b>żaglowy</b>,</li>
<li>6. statek o <b>napędzie mechanicznym</b>.</li>
</ul>
<div class="callout warn"><span class="ct">Pułapka</span>Jacht <b>pod żaglami i jednocześnie na silniku</b> jest traktowany jak statek o <b>napędzie mechanicznym</b> — w dzień nosi <b>czarny stożek wierzchołkiem w dół</b>.</div>
<h3>Wąskie przejścia i systemy rozgraniczenia ruchu (TSS)</h3>
<ul>
<li>Statek &lt; 20 m i statek żaglowy <b>nie powinny przeszkadzać</b> statkom mogącym bezpiecznie płynąć tylko w torze / korzystającym z TSS.</li>
<li>TSS przecinaj <b>możliwie prostopadle</b> do kierunku ruchu; korzystaj ze Strefy Ruchu Przybrzeżnego.</li>
</ul>
<h3>Światła (statek w drodze)</h3>
<ul>
<li>Każdy statek w drodze: <b>burtowe</b> (lewe czerwone, prawe zielone — po 112,5°) i <b>rufowe białe</b> (135°). Statek o napędzie mechanicznym dodatkowo <b>białe masztowe</b> (225°); przy &gt;50 m — dwa masztowe.</li>
<li>Żaglowy: burtowe + rufowe (opcjonalnie czerwone nad zielonym na topie; &lt;20 m może latarnia trójkolorowa).</li>
<li>Na kotwicy: w nocy białe dookólne (1 przy &lt;50 m; 2 przy ≥50 m), w dzień <b>kula</b>. Na mieliźnie: kotwiczne + <b>dwa czerwone</b> dookólne, w dzień <b>trzy kule</b>. Statek przy kei nie nosi świateł nawigacyjnych.</li>
<li>Specjalne dodatkowe (dookólne): NUC — <b>2 czerwone</b>; RAM — <b>czerwone-białe-czerwone</b>; ograniczony zanurzeniem — <b>3 czerwone</b>; połów trałujący — <b>zielone nad białym</b>; pilot — <b>białe nad czerwonym</b>.</li>
<li>Światła zapala się <b>od zachodu do wschodu słońca</b> (oraz przy ograniczonej widzialności).</li>
</ul>
<h3>Sygnały dźwiękowe</h3>
<p>Krótki ≈ 1 s, długi ≈ 4–6 s.</p>
<table class="tbl"><tr><th>Sygnał</th><th>Znaczenie (statki widzące się)</th></tr>
<tr><td><b>1 krótki</b></td><td>zmieniam kurs <b>w prawo</b></td></tr>
<tr><td><b>2 krótkie</b></td><td>zmieniam kurs <b>w lewo</b></td></tr>
<tr><td><b>3 krótkie</b></td><td>pracuję maszynami <b>wstecz</b></td></tr>
<tr><td><b>5 (lub więcej) krótkich</b></td><td>sygnał ostrzegawczy / wątpliwości</td></tr></table>
<p><b>Ograniczona widzialność (Praw. 35):</b> napęd mechaniczny z ruchem — <b>1 długi co ≤2 min</b>; bez ruchu — <b>2 długie</b>; żaglowy / połów / RAM / zanurz. / holujący — <b>1 długi + 2 krótkie</b>; na kotwicy — szybkie bicie w dzwon co ≤1 min. We mgle: zmniejsz prędkość, wyznacz obserwatora, bądź gotów do manewru.</p>
<h3>Dokumenty jachtu morskiego</h3>
<ul>
<li><b>Certyfikat okrętowy / zaświadczenie o rejestracji</b> (przynależność państwowa, prawo do bandery).</li>
<li>Świadectwo klasy lub orzeczenie zdatności, <b>wykaz wyposażenia ruchomego</b> + atesty, polisa <b>OC jachtu + NNW załogi</b>, dziennik jachtowy (dobra praktyka), lista załogi (wg akwenu).</li>
<li>Załoga: paszport (rejs międzynarodowy) lub dowód, patent, <b>świadectwo operatora SRC</b> jeśli jest VHF.</li>
<li>Obowiązkowe wyposażenie polskiego jachtu określa <b>załącznik nr 1 do Rozporządzenia</b> (28.02.2012) — sprawdzasz wg <b>Karty Bezpieczeństwa</b> jachtu.</li>
</ul>`,

ratownictwo:`
<h3>Zasady bezpiecznej żeglugi</h3>
<ul>
<li>„Jedna ręka dla jachtu, druga dla siebie”; poruszaj się burtą <b>nawietrzną</b>; powtarzaj komendy.</li>
<li>W nocy i w trudnych warunkach: rozpięta <b>lajflina</b> + <b>pasy bezpieczeństwa</b>; w dzień asekuracja zwykle od 4°B.</li>
<li>Środki ratunkowe — w miejscach łatwo dostępnych; przed rejsem przeszkól załogę (role alarmowe, sprzęt, bezpieczna praca) — to <b>pierwszeństwo</b> przed wyjściem.</li>
</ul>
<h3>Środki asekuracyjne i ratunkowe</h3>
<ul>
<li><b>Pas bezpieczeństwa (asekuracyjny)</b> z linką — wpina do lajfliny/osprzętu; chroni przed wypadnięciem.</li>
<li><b>Pas ratunkowy (kamizelka ratunkowa)</b>: utrzymuje twarzą do góry, kołnierz pod głowę, <b>pas krokowy</b>, jaskrawy kolor, gwizdek (≥110 dB), lampka (świeci ≥10 h). Bez pasa krokowego to tylko kamizelka asekuracyjna.</li>
<li><b>Koło ratunkowe</b>: po jednym na burtę, łatwo zrzucalne, niezamocowane na stałe. Jedno z <b>30 m</b> pływającej linki, drugie z <b>samozapalającą się pławką świetlną</b> (świeci ≥45 min). Rzucaj <b>na wiatr od człowieka</b>.</li>
<li><b>Tyka ratunkowa</b> (pławka z chorągiewką i światłem) — łatwo wyrzucana za rufę, mały dryf jak człowiek.</li>
</ul>
<h3>Tratwa ratunkowa</h3>
<ul>
<li>Mocowana pasami z <b>hakiem odrzutnym (ręcznym) i zwalniakiem hydrostatycznym</b> — przy zatonięciu wypływa sama; <b>zwalniak i atest tratwy muszą mieć ważną datę</b>.</li>
<li>Wodować z burty <b>zawietrznej</b>; linka operacyjna przymocowana do jachtu; po wyrzuceniu pociągnij linkę — gaz napełnia tratwę (~1 min). Linka operacyjna to <b>nie cuma</b>.</li>
<li>Wyposażenie wg SOLAS (m.in.: nóż i czerpak, dryfkotwy, wiosła, pompka, racje wody i żywności, apteczka, latarka, lusterko, <b>4 rakiety spadochronowe + 6 pochodni ręcznych + 2 pławki dymne</b>, środki ochrony cieplnej).</li>
<li><b>Opuszczenie jachtu</b> tylko na wyraźny rozkaz kapitana — dopiero gdy kadłub przestaje utrzymywać się na wodzie ("wsiadaj do tratwy krok w górę").</li>
</ul>
<h3>Człowiek za burtą — patrz moduł „Manewry”</h3>
<p>Procedury MOB na żaglach i na silniku krok po kroku znajdziesz w trybie <b>🪢 Praktyka</b>.</p>
<h3>Sygnały wzywania pomocy (wg MPZZM)</h3>
<ul>
<li>Radiowo: <b>MAYDAY</b> (×3, niebezpieczeństwo życia) — nazwa, pozycja, rodzaj niebezpieczeństwa i pomocy. <b>PAN-PAN</b> (×3) — sygnał pilny (np. pomoc medyczna).</li>
<li><b>SOS</b> (···−−−···) Morse'em; flagi <b>N+C</b>; flaga kwadratowa z kulą nad/pod nią; <b>płomień</b> na statku; <b>czerwona rakieta spadochronowa / czerwona pochodnia</b>; <b>pomarańczowy dym</b>; wystrzał co minutę; ciągły sygnał mgłowy; <b>powolne unoszenie i opuszczanie obu ramion</b>; EPIRB.</li>
</ul>
<div class="callout"><span class="ct">Kolory pirotechniki</span><b>Czerwona</b> = wzywanie pomocy. <b>Biała</b> = oświetlenie / zwrócenie uwagi (np. ostrzeżenie przed kolizją). Rozpoznanie rakiet po garbach: czerwona 1, zielona 2, biała 3.</div>
<h3>GMDSS / VHF</h3>
<ul>
<li>VHF: kanał <b>16</b> — wywoławczo-bezpieczeństwa. <b>DSC</b> — cyfrowe wezwanie (przycisk DISTRESS). Do obsługi potrzebne świadectwo (SRC) i licencja radiostacji.</li>
</ul>
<h3>Hipotermia i pierwsza pomoc</h3>
<div class="callout warn"><span class="ct">Hipotermia</span>Zabezpiecz przed dalszą utratą ciepła (folia NRC, koc, śpiwór). Przytomnemu podaj <b>ciepłe, osłodzone płyny</b>. <b>Nie podawaj alkoholu</b> (rozszerza naczynia → szybsza utrata ciepła). Działaj <b>delikatnie</b>, jak najszybciej opieka lekarska.</div>
<ul>
<li><b>RKO:</b> <b>30 uciśnięć klatki : 2 wdechy</b>. U podjętego z wody nieprzytomnego najpierw sprawdź <b>oddech i tętno</b>.</li>
<li><b>Oparzenia:</b> chłodzić zimną wodą, jałowy opatrunek (bez tłuszczu/kremów).</li>
</ul>
<h3>Pożar i awarie</h3>
<ul>
<li>Zapach tlącej się izolacji → <b>odłącz akumulatory</b> (główny wyłącznik / klemy).</li>
<li>Pożar w komorze silnika: <b>wyłącz silnik</b>, tylko <b>lekko uchyl</b> pokrywę i od razu użyj gaśnicy (nie otwieraj szeroko — dopływ tlenu).</li>
<li>Liczba gaśnic i sygnalizacja dźwiękowa (gwizdek + dzwon na większym jachcie) wg Karty Bezpieczeństwa.</li>
</ul>
<h3>Ewakuacja śmigłowcem / holowanie</h3>
<ul>
<li>Śmigłowiec podchodzi <b>pod wiatr od strony rufy</b>; nie chwytaj liny przed jej zetknięciem z pokładem/wodą (ładunki elektrostatyczne). Bez bagażu.</li>
<li>Hol mocuj do mocnego punktu (maszt/poler/winda), prowadź przez kluzę; długość holu dobierz do fali; warto obciążyć hol (np. kotwicą).</li>
</ul>`,

manewry:`
<h3>Efekt śruby (prop walk)</h3>
<ul>
<li>Śruba <b>prawoskrętna</b> na biegu wstecznym znosi rufę <b>w lewo</b> (lewoskrętna — w prawo). Wykorzystaj to dobierając burtę cumowania.</li>
<li>Strumień zaśrubowy + ster działają tylko, gdy śruba pracuje <b>do przodu</b> (na wstecznym ster jest mało skuteczny).</li>
</ul>
<h3>Manewry portowe na silniku</h3>
<ul>
<li><b>Zacieśnianie cyrkulacji:</b> krótkie „strzały” do przodu z wychylonym sterem, między nimi luz — jacht skręca w miejscu prawie bez nabierania prędkości.</li>
<li><b>Cumy i szpringi:</b> szpring (lina skośna) pozwala bezpiecznie odbić dziób lub rufę i wyjść z ciasnego miejsca; cumy dziobowe/rufowe + szpringi trzymają jacht przy nabrzeżu.</li>
<li>Manewruj wolno — „rozpędzony jacht nie ma hamulców”; zawsze miej <b>manewr zapasowy</b>.</li>
</ul>
<h3>Manewry pod żaglami</h3>
<ul>
<li><b>Zwrot przez sztag</b> — dziób przez linię wiatru. Komendy: „Do zwrotu przez sztag — gotuj!”, „Zwrot!”. Płynnie przeprowadź dziób przez łopot, przełóż foka na nową burtę.</li>
<li><b>Zwrot przez rufę</b> — rufa przez linię wiatru (kursy pełne). Kontroluj grota (wybierz przed przejściem, kontrolowanie przerzuć) — przy silnym wietrze ryzykowny.</li>
<li><b>Stawanie w dryf</b> — fok wybrany „na backstag” (na przeciwną burtę), grot wyluzowany, ster ku nawietrznej. Jacht „leży” prawie w miejscu — np. do odpoczynku, refowania, oczekiwania.</li>
<li><b>Refowanie</b> — zmniejszanie powierzchni żagli; reefuj zawczasu, zanim warunki zmuszą.</li>
</ul>
<h3>Spinaker (kursy pełne)</h3>
<ul>
<li>Liny: <b>bras</b> (po nawietrznej, ustawia spinakerbom), <b>kontrabras/topenanta</b>, <b>szoty</b>.</li>
<li>Zmiana kursu na <b>pełniejszy</b> (odpadanie): luzuj bras... — patrz pytania testowe (dystraktory dobrane realistycznie).</li>
</ul>
<h3>Człowiek za burtą (MOB)</h3>
<div class="callout warn"><span class="ct">Pierwsze sekundy — zawsze</span>Krzyknij „CZŁOWIEK ZA BURTĄ!”, <b>rzuć koło/tykę</b> na wiatr od człowieka, wyznacz <b>obserwatora</b> wskazującego cały czas ręką, naciśnij <b>MOB</b> na ploterze/GPS (zapamiętuje pozycję i daje namiar + odległość do punktu).</div>
<p>Pełne procedury MOB <b>na żaglach</b> i <b>na silniku</b> (krok po kroku, z checklistą) są w trybie <b>🪢 Praktyka</b>.</p>
<h3>Planowanie rejsu</h3>
<ul>
<li>Uwzględnij: ograniczenia wejścia/wyjścia (pływy, śluzy), odległość i czas, zagrożenia na trasie, <b>porty schronienia</b> (decydujące: szerokość i głębokość wejścia oraz możliwości manewrowe w trudnych warunkach), przygotowanie jachtu i załogi.</li>
<li>Sprzęt i mapy: komplet aktualnych map (papierowych — wektorowe nie są pełnym zamiennikiem wg przepisów), locje, spisy świateł, tablice/atlasy pływów na akweny pływowe.</li>
<li>Decyzje pogodowe: przy prognozie sztormowej (np. NW 7/9°B) rozsądnie <b>zostać w porcie</b> i kontynuować po osłabnięciu wiatru — bezpieczeństwo przed planem.</li>
<li><b>Halsowanie pod wiatr</b> wydłuża drogę o ~<b>40%</b> (kąt martwy ~90°); średni dobowy przelot 12-metrowego jachtu przyjmuje się orientacyjnie ~<b>100 Mm</b>.</li>
</ul>
<h3>Kotwiczenie</h3>
<ul>
<li>Długość wydanego łańcucha: orientacyjnie <b>3–5× głębokość</b> w dobrym dnie i spokoju; więcej przy wietrze/fali. Na 8 m głębokości daj rząd <b>30–40 m</b>.</li>
<li>Sprawdź na mapie charakter dna (muł/piasek trzymają dobrze; skała/trawa gorzej) i czy jest miejsce na obrót na łańcuchu.</li>
</ul>`

      <button class="btn brand" id="eAgain">▶ Nowy egzamin</button>
      ${errors>0?'<button class="btn primary" data-go="wrong">⚠️ Przejrzyj błędy</button>':''}
      <button class="btn ghost" id="eReview">Pokaż omówienie wszystkich pytań</button>
      <button class="btn ghost" data-go="start">⚓ Pulpit</button>
    </div>
    <div id="eReviewBox"></div>`;
  v.querySelector('#eAgain').addEventListener('click', startExam);
  v.querySelector('#eReview').addEventListener('click',()=>{
    const box=$('#eReviewBox');
    if(box.innerHTML){ box.innerHTML=''; return; }
    box.innerHTML='<h3 class="sec">Omówienie</h3>'+EXAM.pool.map((q,i)=>{
      const a=EXAM.answers[i]; const ok=a===q.correct;
      return `<div class="revitem ${a==null?'skip':(ok?'good':'bad')}">
        <div class="revq">${i+1}. ${esc(q.q)}</div>
        <div class="reva">${a==null?'<i>bez odpowiedzi</i>':('Twoja odpowiedź: <b>'+LETTERS[a]+'</b> — '+esc(q.opts[a]))}</div>
        ${ok?'':'<div class="revc">Poprawna: <b>'+LETTERS[q.correct]+'</b> — '+esc(q.opts[q.correct])+'</div>'}
        <div class="revx">${esc(q.exp)}</div>
      </div>`;
    }).join('');
    box.scrollIntoView({behavior:'smooth'});
  });
}

/* =====================================================================
   PRAKTYKA — procedury z listą kontrolną i samooceną
   ===================================================================== */
function getPrac(){ return LS.get(K.prac, {}); }
function setPrac(p){ LS.set(K.prac,p); }
RENDER.practice = function(){
  const v=$('#view-practice'); const data=getPrac();
  v.innerHTML=`
    <h1 class="vh">🪢 Praktyka</h1>
    <p class="vsub">Procedury krok po kroku. Odhaczaj wykonane czynności i oceniaj, jak dobrze opanowałeś każdą procedurę. Postęp zapisuje się w przeglądarce.</p>
    <div class="proclist">
      ${PRACTICAL.map(p=>{
        const st=data[p.id]||{checked:[],rate:null};
        const done=(st.checked||[]).filter(Boolean).length;
        return `<div class="proc" data-proc="${p.id}" style="--mc:${MOD[p.cat].color}">
          <div class="prochead"><span class="catpill sm" style="--mc:${MOD[p.cat].color}">${MOD[p.cat].icon}</span><h3>${esc(p.title)}</h3><span class="procdone">${done}/${p.steps.length}</span></div>
          <p class="procintro">${esc(p.intro)}</p>
          <ol class="steps">
            ${p.steps.map((s,i)=>`<li class="step"><label><input type="checkbox" data-step="${i}" ${st.checked&&st.checked[i]?'checked':''}><span>${esc(s)}</span></label></li>`).join('')}
          </ol>
          <div class="selfrate">
            <span class="srl">Samoocena:</span>
            <button class="rate r-red ${st.rate==='red'?'on':''}" data-rate="red">🔴 do powtórki</button>
            <button class="rate r-amber ${st.rate==='amber'?'on':''}" data-rate="amber">🟡 średnio</button>
            <button class="rate r-green ${st.rate==='green'?'on':''}" data-rate="green">🟢 umiem</button>
            <button class="mini procreset">reset</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  v.querySelectorAll('.proc').forEach(card=>{
    const id=card.getAttribute('data-proc'); const proc=PRACTICAL.find(p=>p.id===id);
    function st(){ const d=getPrac(); if(!d[id]) d[id]={checked:new Array(proc.steps.length).fill(false),rate:null}; if(!d[id].checked) d[id].checked=new Array(proc.steps.length).fill(false); return {d, s:d[id]}; }
    card.querySelectorAll('input[data-step]').forEach(cb=>cb.addEventListener('change',()=>{
      const {d,s}=st(); s.checked[parseInt(cb.getAttribute('data-step'),10)]=cb.checked; setPrac(d);
      card.querySelector('.procdone').textContent=s.checked.filter(Boolean).length+'/'+proc.steps.length;
    }));
    card.querySelectorAll('.rate').forEach(rb=>rb.addEventListener('click',()=>{
      const {d,s}=st(); const val=rb.getAttribute('data-rate'); s.rate=(s.rate===val?null:val); setPrac(d);
      card.querySelectorAll('.rate').forEach(x=>x.classList.remove('on')); if(s.rate) rb.classList.add('on');
    }));
    card.querySelector('.procreset').addEventListener('click',()=>{
      const d=getPrac(); d[id]={checked:new Array(proc.steps.length).fill(false),rate:null}; setPrac(d);
      card.querySelectorAll('input[data-step]').forEach(cb=>cb.checked=false);
      card.querySelectorAll('.rate').forEach(x=>x.classList.remove('on'));
      card.querySelector('.procdone').textContent='0/'+proc.steps.length;
    });
  });
};

/* =====================================================================
   START APLIKACJI
   ===================================================================== */
updateBadges();
show('start');

</script>
</body>
</html>

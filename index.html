{id:"b11", cat:"budowa", q:"Na jachcie zwykle stosuje się dwa obwody akumulatorów, aby:", opts:["zwiększyć napięcie instalacji do 24 V","oddzielić akumulator rozruchowy silnika od akumulatora zasilającego odbiorniki","umożliwić ładowanie z dwóch alternatorów naraz"], correct:1, exp:"Osobny akumulator rozruchowy gwarantuje, że nawet po rozładowaniu baterii zasilającej światła i elektronikę wciąż uruchomimy silnik."},
{id:"b12", cat:"budowa", q:"Typowa instalacja oświetlenia nawigacyjnego małego jachtu pracuje pod napięciem:", opts:["12 V (lub 24 V) prądu stałego","230 V prądu zmiennego","400 V prądu zmiennego"], correct:0, exp:"Pokładowa instalacja jachtowa to zwykle 12 V DC (większe jednostki 24 V). Napięcie 230 V pojawia się tylko z lądu lub z przetwornicy."},
{id:"b13", cat:"budowa", q:"Mały silnik jachtowy najczęściej chłodzony jest:", opts:["wyłącznie powietrzem","wodą zaburtową (bezpośrednio lub przez wymiennik)","olejem silnikowym w obiegu zamkniętym"], correct:1, exp:"Większość silników jachtowych chłodzi woda zaburtowa zasysana pompą; brak strugi wody na wylocie spalin to sygnał awarii chłodzenia — należy zgasić silnik."},
{id:"b14", cat:"budowa", q:"Zęza jachtu to:", opts:["najniższa część wnętrza kadłuba, gdzie zbiera się woda","schowek na żagle na dziobie","zbiornik wody pitnej"], correct:0, exp:"W zęzie (najniższym miejscu kadłuba) gromadzi się woda; opróżnia ją pompa zęzowa. Stały wysoki poziom wody w zęzie to sygnał przecieku."},
{id:"b15", cat:"budowa", q:"Efekt strumienia zaśrubowego (tzw. efekt śruby) powoduje, że na biegu wstecznym:", opts:["rufa jachtu z typową śrubą prawoskrętną ucieka w lewo (na lewą burtę)","dziób zawsze odpada pod wiatr","jacht przyspiesza szybciej niż na biegu naprzód"], correct:0, exp:"Śruba prawoskrętna na wstecznym znosi rufę w lewo (na bakburtę). To kluczowe przy planowaniu manewrów portowych — patrz moduł Manewry."},
{id:"b16", cat:"budowa", q:"Płetwa sterowa działa skutecznie przede wszystkim wtedy, gdy:", opts:["jacht stoi w miejscu","przez płetwę przepływa woda (jacht ma rozpęd lub strugę od śruby)","silnik pracuje na biegu jałowym"], correct:1, exp:"Ster zmienia kierunek dzięki przepływowi wody po płetwie. Bez rozpędu (lub strugi zaśrubowej) ster jest bezwładny — dlatego do manewru potrzebny jest ruch."},
{id:"b17", cat:"budowa", q:"Achtersztag to element olinowania stałego biegnący:", opts:["od topu masztu do rufy","od masztu do dziobu","od bomu do pokładu"], correct:0, exp:"Achtersztag podpiera maszt od rufy i pozwala napiąć sztag przedni (kontrola wygięcia masztu i naciągu liku przedniego foka)."},
{id:"b18", cat:"budowa", q:"Knaga (np. rogowa, szczękowa) służy do:", opts:["mocowania i wykładania liny pod obciążeniem","podnoszenia kotwicy","regulacji napięcia want"], correct:0, exp:"Na knadze obkłada się i zaciska liny (cumy, fały, szoty). Kabestan (winda) pomaga wybierać liny pod dużym naciągiem."},
{id:"b19", cat:"budowa", q:"Bom to:", opts:["pozioma reja u dołu grota, do której mocowany jest jego lik dolny","element dziobowy do mocowania foka","podpora masztu z przodu"], correct:0, exp:"Bom to drzewce u dołu grota; przy zwrocie przez rufę przerzuca się on gwałtownie na drugą burtę — stąd ryzyko uderzenia w głowę."},
{id:"b20", cat:"budowa", q:"Najpopularniejszym materiałem żagli turystycznych jest:", opts:["dakron (poliester tkany)","bawełna impregnowana","jedwab naturalny"], correct:0, exp:"Dakron (tkanina poliestrowa) jest trwały, odporny na UML i tani — standard dla żagli turystycznych. Laminaty są lżejsze, ale droższe i mniej trwałe."},
{id:"b21", cat:"budowa", q:"Kadłuby współczesnych jachtów turystycznych najczęściej buduje się z:", opts:["laminatu poliestrowo-szklanego (włókno szklane + żywica)","litego drewna dębowego","blachy aluminiowej spawanej"], correct:0, exp:"Laminat szklany (GRP) dominuje ze względu na trwałość, niski koszt utrzymania i łatwość produkcji. Stal i aluminium spotyka się na większych, wyprawowych jednostkach."},
{id:"b22", cat:"budowa", q:"Salingi na maszcie służą do:", opts:["odchylenia want i lepszego podparcia masztu","mocowania anteny radiowej","podnoszenia bandery"], correct:0, exp:"Salingi (krótkie poprzeczki) odchylają wanty od masztu, zwiększając kąt ich podparcia i sztywność masztu w płaszczyźnie poprzecznej."},

/* === TEORIA ŻEGLOWANIA === */
{id:"t1", cat:"teoria", q:"Wiatr pozorny to:", opts:["wiatr odczuwany na jachcie, będący złożeniem wiatru rzeczywistego i wiatru od ruchu jachtu","wiatr mierzony przez stację meteo na lądzie","wiatr wiejący tylko podczas szkwału"], correct:0, exp:"Wiatr pozorny (odczuwany na pokładzie) to wektorowa suma wiatru rzeczywistego i 'wiatru' wywołanego ruchem jachtu. Żagle trymujemy do wiatru pozornego."},
{id:"t2", cat:"teoria", q:"Kurs, na którym jacht płynie wprost pod wiatr i nie da się go utrzymać (żagle łopoczą), to:", opts:["baksztag","martwy kąt (strefa wiatru, w którą nie da się płynąć)","fordewind"], correct:1, exp:"W sektorze ok. +/-45° od kierunku wiatru żagle nie pracują (martwy kąt). Najostrzej można płynąć kursem bejdewind, nie wprost na wiatr."},
{id:"t3", cat:"teoria", q:"Uszereguj kursy od najostrzejszego (najbliżej wiatru) do najpełniejszego — który zestaw jest poprawny?", opts:["bejdewind, półwiatr, baksztag, fordewind","fordewind, baksztag, półwiatr, bejdewind","półwiatr, bejdewind, fordewind, baksztag"], correct:0, exp:"Od wiatru oddalamy się tak: bejdewind (ostro na wiatr) → półwiatr (wiatr z boku, ~90°) → baksztag (wiatr z tyłu-boku) → fordewind (wiatr z rufy)."},
{id:"t4", cat:"teoria", q:"Na kursie półwiatr wiatr wieje względem osi jachtu mniej więcej:", opts:["prosto od dziobu","prostopadle, z boku (~90°)","prosto od rufy"], correct:1, exp:"Półwiatr to wiatr z trawersu (~90° do osi jachtu) — zwykle najszybszy i najwygodniejszy kurs."},
{id:"t5", cat:"teoria", q:"Całkowitą siłę aerodynamiczną żagla rozkłada się na:", opts:["siłę ciągu (napędową) i siłę przechylająco-znoszącą (boczną)","siłę grawitacji i siłę wyporu","tarcie i opór fali"], correct:0, exp:"Siła od żagli dzieli się na składową napędową (pcha jacht do przodu) oraz boczną (przechyla i znosi w bok — dryf). Płetwa/kil równoważy znoszenie."},
{id:"t6", cat:"teoria", q:"Jacht nawietrzny to taki, który:", opts:["samoczynnie ostrzy (kieruje dziób do wiatru) — trzeba trzymać ster","samoczynnie odpada od wiatru","nie reaguje na ster"], correct:0, exp:"Nawietrzność: jacht dąży do ostrzenia, ster trzeba odchylać na zawietrzną. Lekka nawietrzność jest pożądana (bezpieczna — w podmuchu jacht sam staje do wiatru)."},
{id:"t7", cat:"teoria", q:"Stateczność kształtu zawdzięczamy przede wszystkim:", opts:["ciężkiemu balastowi nisko pod kadłubem","szerokiemu kadłubowi o dużej powierzchni wodnicy","wysokiemu masztowi"], correct:1, exp:"Stateczność kształtu daje szeroki, płaski kadłub (jak na jachtach mieczowych). Stateczność ciężaru daje balast w kilu (jachty kilowe)."},
{id:"t8", cat:"teoria", q:"Punkt ostrości (równowagi) jachtu to umowne miejsce, w którym:", opts:["przykłada się wypadkowa siła boczna od żagli","zaczepiona jest kotwica","mocowany jest forsztag"], correct:0, exp:"Wzajemne położenie środka bocznego oporu (kadłub) i środka żagli decyduje o nawietrzności/zawietrzności i o równowadze sterowej jachtu."},
{id:"t9", cat:"teoria", q:"Aby zmniejszyć nadmierny przechył w narastającym wietrze, należy przede wszystkim:", opts:["dobrać żagle: zrefować lub zmniejszyć powierzchnię","dobrać większą genuę","zejść z kursu na fordewind i postawić spinaker"], correct:0, exp:"Przechył rośnie z siłą wiatru. Refowanie zmniejsza powierzchnię żagli i moment przechylający — jacht płynie pewniej i często szybciej."},
{id:"t10", cat:"teoria", q:"Najostrzejszy kurs, jakim typowy jacht turystyczny realnie płynie pod wiatr, to bejdewind o kącie do wiatru rzeczywistego około:", opts:["ok. 20°","ok. 45°","ok. 90°"], correct:1, exp:"Praktyczny kąt bejdewindu to ~45° do wiatru rzeczywistego; bliżej wiatru żagle przestają pracować. Stąd do celu pod wiatr halsujemy zygzakiem."},
{id:"t11", cat:"teoria", q:"Łopotanie żagla na kursie ostrym oznacza najczęściej, że:", opts:["żagiel jest zbyt mocno wybrany","jacht płynie zbyt ostro do wiatru lub żagiel jest zbyt wyluzowany","wiatr całkowicie ustał"], correct:1, exp:"Łopot przedniego liku to sygnał, że płyniemy za ostro albo żagiel jest zbyt luźny — trzeba odpaść lub dobrać szot, aż łopot zniknie."},
{id:"t12", cat:"teoria", q:"Dryf to:", opts:["znoszenie jachtu w bok pod działaniem wiatru","znoszenie jachtu przez prąd morski","celowa zmiana kursu o 180°"], correct:0, exp:"Dryf (znos wiatrowy) to boczne znoszenie jachtu przez wiatr; znos od prądu to oddzielne zjawisko (znos prądowy). Oba uwzględnia się w nawigacji."},
{id:"t13", cat:"teoria", q:"Na kursie fordewind (wiatr prosto z rufy) szczególnie groźny jest:", opts:["nagły, niekontrolowany zwrot przez rufę (przerzucenie bomu)","nadmierny dryf w bok","brak ciągu na żaglach"], correct:0, exp:"Na pełnym kursie łatwo o niezamierzony gwałtowny przerzut bomu (rufa przejdzie linię wiatru) — grozi to urazem głowy i uszkodzeniem osprzętu. Pomaga preventer/obciągacz."},
{id:"t14", cat:"teoria", q:"Im niżej położony jest środek ciężkości jachtu (np. dzięki balastowi), tym:", opts:["jacht jest mniej stateczny","większy jest moment prostujący i lepsza stateczność","jacht płynie wolniej na każdym kursie"], correct:1, exp:"Nisko położony ciężar zwiększa ramię i moment prostujący — jacht mocniej opiera się przechyłom i trudniej go wywrócić."},
{id:"t15", cat:"teoria", q:"Na kursie baksztag, w stosunku do półwiatru, wiatr pozorny zwykle:", opts:["rośnie i zbliża się do dziobu","maleje i przesuwa się ku rufie","znika całkowicie"], correct:1, exp:"Im pełniejszy kurs, tym wiatr pozorny słabszy i bardziej z tyłu — bo prędkość jachtu częściowo 'ucieka' przed wiatrem rzeczywistym."},
{id:"t16", cat:"teoria", q:"Zaleta lekkiej nawietrzności jachtu polega na tym, że:", opts:["w silniejszym podmuchu jacht samoczynnie ostrzy i 'wytraca' nadmiar wiatru","jacht sam odpada i przyspiesza w szkwale","ster jest całkowicie odciążony"], correct:0, exp:"Lekka nawietrzność jest bezpieczna: po puszczeniu steru jacht staje dziobem do wiatru, żagle łopoczą i przechył maleje. Zawietrzność jest niebezpieczna (jacht odpada)."},

/* === NAWIGACJA === */
{id:"n1", cat:"nawigacja", q:"Jedna mila morska to:", opts:["1000 m","1852 m","1609 m"], correct:1, exp:"1 Mm = 1852 m i odpowiada 1 minucie łuku południka (szerokości geograficznej). 1609 m to mila lądowa."},
{id:"n2", cat:"nawigacja", q:"Odległość 1 minuty (1') szerokości geograficznej na mapie odpowiada:", opts:["1 mili morskiej","1 kilometrowi","1 kablowi"], correct:0, exp:"1' szerokości = 1 Mm. Dlatego na mapie Merkatora odległości mierzy się ZAWSZE na bocznej skali szerokości — na wysokości mierzonego odcinka."},
{id:"n3", cat:"nawigacja", q:"Węzeł (kn) to jednostka:", opts:["prędkości równa 1 mili morskiej na godzinę","odległości równej 100 m","siły wiatru"], correct:0, exp:"1 węzeł = 1 Mm/h. Prędkość 6 kn oznacza pokonywanie 6 mil morskich w ciągu godziny."},
{id:"n4", cat:"nawigacja", q:"Mapa w odwzorowaniu Merkatora jest:", opts:["wiernokątna (loksodroma jest linią prostą), ale zniekształca odległości","wiernopowierzchniowa","wiernoodległościowa na całym arkuszu"], correct:0, exp:"Merkator zachowuje kąty (kurs = prosta linia), ale skala rośnie ku biegunom. Dlatego odległość mierzymy lokalnie, na skali szerokości obok danego odcinka."},
{id:"n5", cat:"nawigacja", q:"Deklinacja magnetyczna (d) to kąt między:", opts:["północą rzeczywistą (geograficzną) a północą magnetyczną","kursem a namiarem","dziobem a wiatrem"], correct:0, exp:"Deklinacja to lokalne odchylenie igły magnetycznej od północy geograficznej; jej wartość i roczną zmianę odczytujemy z mapy (z róży kompasowej)."},
{id:"n6", cat:"nawigacja", q:"Dewiacja kompasu (δ) jest spowodowana przede wszystkim:", opts:["polem magnetycznym samego jachtu (silnik, metalowe przedmioty)","prądem morskim","wiatrem"], correct:0, exp:"Dewiacja to błąd kompasu od pól magnetycznych na jachcie; zależy od kursu i opisuje ją tabela/krzywa dewiacji sporządzona dla danego jachtu."},
{id:"n7", cat:"nawigacja", q:"Całkowita poprawka kompasu (cp) jest równa:", opts:["d − δ","d + δ (suma deklinacji i dewiacji)","δ − d"], correct:1, exp:"cp = d + δ. Poprawki wschodnie (E) bierzemy ze znakiem plus, zachodnie (W) ze znakiem minus."},
{id:"n8", cat:"nawigacja", q:"Kurs rzeczywisty obliczamy ze wzoru:", opts:["KR = KK + cp (= KK + d + δ)","KR = KK − d − δ","KR = KK + dryf"], correct:0, exp:"Do kursu kompasowego dodajemy całkowitą poprawkę: KR = KK + d + δ. To podstawowe przejście 'od kompasu do mapy'."},
{id:"n9", cat:"nawigacja", q:"Mamy KK = 100°, deklinacja d = +5° (E), dewiacja δ = −3° (W). Kurs rzeczywisty KR wynosi:", opts:["98°","102°","108°"], correct:1, exp:"cp = d + δ = (+5) + (−3) = +2°. KR = KK + cp = 100° + 2° = 102°."},
{id:"n10", cat:"nawigacja", q:"Chcemy płynąć kursem rzeczywistym KR = 250°. Deklinacja d = −4° (W), dewiacja δ = +2° (E). Jaki kurs kompasowy KK nastawić?", opts:["252°","248°","244°"], correct:0, exp:"cp = d + δ = (−4)+(+2) = −2°. Z KR = KK + cp wynika KK = KR − cp = 250 − (−2) = 252°."},
{id:"n11", cat:"nawigacja", q:"Namiar rzeczywisty na obiekt obliczamy z namiaru kompasowego analogicznie do kursu, czyli:", opts:["NR = NK + cp","NR = NK − cp","NR = NK + dryf"], correct:0, exp:"Tak samo jak kurs: NR = NK + cp (= NK + d + δ). Pozycję obserwowaną wyznaczamy z przecięcia co najmniej dwóch namiarów rzeczywistych naniesionych na mapę."},
{id:"n12", cat:"nawigacja", q:"Kurs drogi po wodzie (KDw) uwzględnia dodatkowo:", opts:["poprawkę na dryf (znos od wiatru)","poprawkę na prąd","tylko deklinację"], correct:0, exp:"KDw = KR + poprawka na dryf (kąt znosu wiatrowego). Dopiero KDd = KDw + poprawka na prąd daje rzeczywistą drogę nad dnem."},
{id:"n13", cat:"nawigacja", q:"Kurs drogi nad dnem (KDd) powstaje przez uwzględnienie w KDw:", opts:["poprawki na prąd (znos prądowy)","ponownie dewiacji","prędkości logu"], correct:0, exp:"KDd = KDw + poprawka na prąd. To linia, po której jacht faktycznie przemieszcza się względem dna — najważniejsza dla dotarcia do celu."},
{id:"n14", cat:"nawigacja", q:"Według przyjętej konwencji znos od dryfu jest dodatni, gdy wiatr wieje:", opts:["z lewej burty (z bakburty)","z prawej burty (ze sterburty)","prosto z dziobu"], correct:0, exp:"W konwencji z podręcznika: wiatr z lewej burty → poprawka dodatnia, wiatr z prawej → ujemna (jacht znoszony jest na zawietrzną, w stronę przeciwną do wiatru)."},
{id:"n15", cat:"nawigacja", q:"Zliczanie drogi (nawigacja zliczeniowa) polega na wyznaczaniu pozycji na podstawie:", opts:["przebytego kursu i przebytej drogi (z logu/czasu i prędkości) od znanej pozycji","wyłącznie odczytu GPS","namiaru na jeden obiekt"], correct:0, exp:"Pozycję zliczoną otrzymujemy, odkładając od ostatniej pewnej pozycji przebyty kurs i drogę. Pozycja obserwowana (z namiarów/GPS) jest pewniejsza niż zliczona."},
{id:"n16", cat:"nawigacja", q:"Logiem burtowym mierzymy czas przejścia znacznika na linie wzdłuż 12 m jachtu — trwało to 6 s. Prędkość jachtu wynosi w przybliżeniu:", opts:["ok. 1 kn","ok. 4 kn","ok. 8 kn"], correct:1, exp:"v = 12 m / 6 s = 2 m/s. 2 m/s × 3600 s / 1852 m ≈ 3,9 kn, czyli około 4 węzły."},
{id:"n17", cat:"nawigacja", q:"Płyniemy wzdłuż jednego południka z φ = 54°35′N do φ = 54°39′N. Przebyta odległość to:", opts:["4 Mm","40 Mm","0,4 Mm"], correct:0, exp:"Różnica szerokości = 39' − 35' = 4'. Ponieważ 1' szerokości = 1 Mm, przebyta droga to 4 Mm."},
{id:"n18", cat:"nawigacja", q:"Głębokości na mapie morskiej podawane są względem:", opts:["chwilowego poziomu wody","przyjętego poziomu odniesienia mapy (zwykle najniższej wody pływowej, LAT)","średniego poziomu morza w danym roku"], correct:1, exp:"Sondaże odnoszą się do poziomu odniesienia mapy (często LAT). Rzeczywista głębokość = głębokość z mapy + aktualny stan pływu (wysokość pływu)."},
{id:"n19", cat:"nawigacja", q:"Pozycję obserwowaną można wyznaczyć m.in. przez:", opts:["przecięcie dwóch (lepiej trzech) namiarów rzeczywistych na rozpoznane obiekty","odczyt samego kursu kompasowego","pomiar prędkości logiem"], correct:0, exp:"Dwa namiary dają punkt przecięcia (fix). Trzeci namiar tworzy 'trójkąt błędów' i pozwala ocenić dokładność. Najlepiej, gdy namiary przecinają się pod dużym kątem."},
{id:"n20", cat:"nawigacja", q:"Współrzędne geograficzne punktu to:", opts:["szerokość (φ) mierzona od równika i długość (λ) mierzona od południka zerowego","kurs i namiar","deklinacja i dewiacja"], correct:0, exp:"Szerokość φ (0–90° N/S od równika) i długość λ (0–180° E/W od Greenwich) jednoznacznie określają pozycję na kuli ziemskiej."},
{id:"n21", cat:"nawigacja", q:"Róża kompasowa na mapie podaje m.in.:", opts:["deklinację magnetyczną i jej roczną zmianę dla danego rejonu","tabelę pływów","wykaz świateł"], correct:0, exp:"Z róży kompasowej odczytujemy lokalną deklinację i jej roczną zmianę — niezbędne do przeliczeń kursów między północą rzeczywistą a magnetyczną."},
{id:"n22", cat:"nawigacja", q:"Jeden kabel to:", opts:["1/10 mili morskiej, czyli 185,2 m","1000 m","1 minuta długości geograficznej"], correct:0, exp:"Kabel = 0,1 Mm = 185,2 m. Używa się go do podawania niewielkich odległości (np. od niebezpieczeństwa nawigacyjnego)."},
{id:"n23", cat:"nawigacja", q:"Poprawkę (deklinację/dewiację) o wartości wschodniej (E) w obliczeniach kursów przyjmujemy ze znakiem:", opts:["plus (+)","minus (−)","zawsze zero"], correct:0, exp:"Konwencja: wschodnia (E) = +, zachodnia (W) = −. Pozwala to liczyć cp = d + δ i przejścia KK↔KR jednolicie ze znakami."},
{id:"n24", cat:"nawigacja", q:"Aby z kursu kompasowego otrzymać kurs magnetyczny, należy:", opts:["dodać dewiację: KM = KK + δ","dodać deklinację: KM = KK + d","odjąć całkowitą poprawkę"], correct:0, exp:"Kompas → magnetyczny: KM = KK + δ (uwzględniamy błąd jachtu). Następnie magnetyczny → rzeczywisty: KR = KM + d (uwzględniamy deklinację)."},

/* === LOCJA === */
{id:"l1", cat:"locja", q:"W systemie IALA region A (do którego należy Polska) pława lewej strony toru wodnego, wchodząc z morza, jest:", opts:["czerwona, kształtu walca (can)","zielona, kształtu stożka","żółta, kształtu kuli"], correct:0, exp:"Region A: lewa strona = CZERWONA, walcowa (cylinder). Wchodząc z morza zostawiamy ją po lewej burcie. Prawa strona = zielona, stożkowa."},
{id:"l2", cat:"locja", q:"W regionie A pława prawej strony toru wodnego (wchodząc z morza) jest:", opts:["czerwona, walcowa","zielona, stożkowa (znak szczytowy: stożek wierzchołkiem do góry)","czarno-żółta"], correct:1, exp:"Prawa strona w regionie A: ZIELONA, stożek wierzchołkiem w górę, światło zielone. Pamiętaj: wchodząc z morza 'zielone po prawej, czerwone po lewej'."},
{id:"l3", cat:"locja", q:"Kierunek oznakowania toru wodnego ('wchodząc z morza') określa się:", opts:["zawsze od północy","od strony morza w stronę portu/lądu","zgodnie z kierunkiem prądu"], correct:1, exp:"Strony toru (lewa/prawa) odnoszą się do kierunku wchodzenia z morza w głąb lądu. Płynąc w przeciwną stronę, kolory mamy odwrotnie względem burt."},
{id:"l4", cat:"locja", q:"Pława kardynalna północna ma znak szczytowy w postaci:", opts:["dwóch stożków wierzchołkami do góry","dwóch stożków wierzchołkami do dołu","dwóch kul"], correct:0, exp:"Północna: dwa czarne stożki wierzchołkami W GÓRĘ (wskazują N), kolor czarny nad żółtym, światło białe VQ lub Q. Czystą wodę omijamy od północy."},
{id:"l5", cat:"locja", q:"Pława kardynalna południowa ma znak szczytowy:", opts:["dwa stożki wierzchołkami w górę","dwa stożki wierzchołkami w dół","stożek i walec"], correct:1, exp:"Południowa: dwa stożki wierzchołkami W DÓŁ, żółty nad czarnym, światło VQ(6)+1 długie lub Q(6)+1 długie. Bezpiecznie omijać od południa."},
{id:"l6", cat:"locja", q:"Pławę kardynalną północną omija się, trzymając się:", opts:["od strony północnej (na północ od pławy jest bezpieczna woda)","od strony południowej","dowolnie, to tylko znak informacyjny"], correct:0, exp:"Pława kardynalna wskazuje, z której strony jest bezpieczna woda względem niebezpieczeństwa. Północną omijamy od północy, wschodnią od wschodu itd."},
{id:"l7", cat:"locja", q:"Pława oznaczająca niebezpieczeństwo odosobnione (isolated danger) ma:", opts:["czarne pasy z czerwoną opaską i znak szczytowy: dwie czarne kule, światło Fl(2)","kolor żółty i znak X","czerwono-białe pasy pionowe"], correct:0, exp:"Niebezpieczeństwo odosobnione: czarna z czerwoną opaską poziomą, dwie czarne kule jako topmark, światło białe Fl(2). Stawiana NAD niebezpieczeństwem o czystej wodzie wokół."},
{id:"l8", cat:"locja", q:"Pława bezpiecznej wody (np. wejście na tor, środek toru) jest:", opts:["czerwono-biała w pasy pionowe, znak szczytowy: czerwona kula","czarno-żółta","zielona stożkowa"], correct:0, exp:"Bezpieczna woda: pionowe czerwono-białe pasy, czerwona kula na topie, światło izofazowe/przerywane/1 długie co 10 s lub Morse'a 'A'. Wokół niej jest żeglowna woda."},
{id:"l9", cat:"locja", q:"Pława specjalna (np. oznaczająca poligon, kabel, tor regatowy) jest:", opts:["żółta, światło żółte","czerwona walcowa","zielona stożkowa"], correct:0, exp:"Pława specjalna jest ŻÓŁTA (znak szczytowy: żółty leżący krzyż X), światło żółte. Nie wyznacza strony toru, lecz specjalny obszar/urządzenie."},
{id:"l10", cat:"locja", q:"Charakterystyka światła 'Fl(2) 10s' oznacza:", opts:["dwa błyski w grupie powtarzane co 10 sekund","światło stałe o zasięgu 10 Mm","dwa sektory światła czerwonego"], correct:0, exp:"Fl = błyskowe; (2) = grupa dwóch błysków; 10s = okres całego cyklu. Charakterystykę i okres odczytuje się z mapy i ze spisu świateł, aby zidentyfikować światło."},
{id:"l11", cat:"locja", q:"Światło izofazowe (Iso) charakteryzuje się tym, że:", opts:["czasy światła i ciemności są równe","jest stale zapalone","daje pojedynczy błysk co 10 s"], correct:0, exp:"Iso = równe okresy światła i ciemności. Oc (przerywane) świeci dłużej niż gaśnie, Fl (błyskowe) świeci krócej niż gaśnie."},
{id:"l12", cat:"locja", q:"Podany w 'Spisie świateł' nominalny zasięg światła to zasięg przy:", opts:["meteorologicznej widzialności 10 Mm","bezchmurnym niebie i pełni księżyca","stanie morza 0"], correct:0, exp:"Zasięg nominalny odnosi się do widzialności meteorologicznej 10 Mm. Realny zasięg ogranicza też wysokość oka obserwatora i krzywizna Ziemi (zasięg geograficzny)."},
{id:"l13", cat:"locja", q:"Locja (pilot) jako publikacja nautyczna zawiera przede wszystkim:", opts:["opis wybrzeży, portów, podejść, prądów i zagrożeń danego akwenu","tylko tabele pływów","wyłącznie wykaz świateł"], correct:0, exp:"Locja opisowo uzupełnia mapę: podejścia, kotwicowiska, porty schronienia, prądy, niebezpieczeństwa. Spis świateł i tablice pływów to osobne wydawnictwa."},
{id:"l14", cat:"locja", q:"Mapy morskie aktualizuje się na bieżąco na podstawie:", opts:["Wiadomości Żeglarskich / Notices to Mariners","prognoz pogody","komunikatów portu macierzystego"], correct:0, exp:"Poprawki do map publikowane są cyklicznie (Wiadomości Żeglarskie / Notices to Mariners). Nieaktualna mapa może nie pokazywać nowych przeszkód lub zmian oznakowania."},
{id:"l15", cat:"locja", q:"Zgodnie z dobrą praktyką i przepisami, podstawą nawigacji na jachcie morskim powinny być:", opts:["aktualne mapy papierowe (mapa elektroniczna jako uzupełnienie)","wyłącznie aplikacja w telefonie","wyłącznie odbiornik GPS bez map"], correct:0, exp:"Komplet aktualnych map papierowych jest wymagany; elektronika (plotter, ECDIS na jachtach najczęściej nieobowiązkowy) bywa uzupełnieniem, ale awaria zasilania nie może pozbawić nas nawigacji."},
{id:"l16", cat:"locja", q:"Rzeczywista głębokość w danej chwili na akwenie pływowym to:", opts:["głębokość z mapy minus wysokość pływu","głębokość z mapy plus aktualna wysokość pływu","zawsze głębokość odczytana z mapy"], correct:1, exp:"Mapa podaje głębokość od poziomu odniesienia (zwykle LAT). Aktualną głębokość uzyskujemy, dodając wysokość pływu odczytaną z tablic pływów na daną godzinę."},
{id:"l17", cat:"locja", q:"Prąd pływowy to:", opts:["poziomy ruch wody towarzyszący przypływowi i odpływowi","stały prąd oceaniczny niezależny od Księżyca","prąd wywołany wyłącznie wiatrem"], correct:0, exp:"Pływ to pionowe wahanie poziomu wody; towarzyszy mu poziomy prąd pływowy (wpływający/wypływający). Jego kierunek i siłę podają atlasy prądów pływowych."},
{id:"l18", cat:"locja", q:"Pływy (przypływy i odpływy) są wywołane głównie:", opts:["oddziaływaniem grawitacyjnym Księżyca i Słońca","wiatrem sztormowym","prądami rzecznymi"], correct:0, exp:"Pływy powstają z grawitacji Księżyca (i w mniejszym stopniu Słońca). Pływy syzygijne (największe) występują przy nowiu i pełni, kwadraturowe (najmniejsze) przy kwadrach."},
{id:"l19", cat:"locja", q:"Latarnia morska z oznaczeniem światła sektorowego (np. biały/czerwony/zielony) służy do:", opts:["wskazywania bezpiecznego sektora podejścia i sektorów niebezpiecznych","pomiaru prędkości wiatru","nadawania prognozy pogody"], correct:0, exp:"Sektory światła latarni informują, w którym wycinku podejścia jest bezpiecznie (zwykle biały) i gdzie grozi niebezpieczeństwo (czerwony/zielony). Czyta się je z mapy i locji."},
{id:"l20", cat:"locja", q:"Pława kardynalna wschodnia ma znak szczytowy:", opts:["dwa stożki podstawami do siebie","dwa stożki wierzchołkami do siebie","dwie kule"], correct:0, exp:"Wschodnia: dwa stożki PODSTAWAMI do siebie (jak beczułka), czarny-żółty-czarny, światło VQ(3) lub Q(3). Omijać od wschodu."},
{id:"l21", cat:"locja", q:"Pława kardynalna zachodnia ma znak szczytowy:", opts:["dwa stożki wierzchołkami do siebie (jak klepsydra/kieliszek)","dwa stożki wierzchołkami w górę","stożek i walec"], correct:0, exp:"Zachodnia: dwa stożki WIERZCHOŁKAMI do siebie (klepsydra), żółty-czarny-żółty, światło VQ(9) lub Q(9). Omijać od zachodu."},
{id:"l22", cat:"locja", q:"Polskie morskie mapy i wydawnictwa nautyczne wydaje przede wszystkim:", opts:["Biuro Hydrograficzne Marynarki Wojennej","najbliższy bosmanat portu","lokalny klub żeglarski"], correct:0, exp:"Oficjalne polskie mapy i pomoce nautyczne pochodzą z Biura Hydrograficznego Marynarki Wojennej (Gdynia). Korzystanie z oficjalnych, aktualnych wydań jest podstawą bezpiecznej nawigacji."},

/* === METEOROLOGIA === */
{id:"m1", cat:"meteo", q:"Ciśnienie atmosferyczne w meteorologii morskiej podaje się w:", opts:["hektopaskalach (hPa)","węzłach","stopniach"], correct:0, exp:"Jednostką jest hPa (1 hPa = 1 mbar). Normalne ciśnienie to ok. 1013 hPa. Szybki spadek ciśnienia zwiastuje pogorszenie pogody i silniejszy wiatr."},
{id:"m2", cat:"meteo", q:"W niżu na półkuli północnej wiatr przy powierzchni wieje:", opts:["zgodnie z ruchem wskazówek zegara, na zewnątrz","przeciwnie do ruchu wskazówek zegara, lekko ku środkowi niżu","prosto wzdłuż izobar bez znoszenia"], correct:1, exp:"Niż (L): wiatr krąży przeciwnie do ruchu wskazówek zegara i jest zbieżny ku centrum. Z niżem wiążą się chmury, opady i silniejszy wiatr."},
{id:"m3", cat:"meteo", q:"W wyżu na półkuli północnej wiatr przy powierzchni wieje:", opts:["zgodnie z ruchem wskazówek zegara, rozbieżnie na zewnątrz","przeciwnie do ruchu wskazówek, ku środkowi","wyłącznie z zachodu"], correct:0, exp:"Wyż (H): wiatr krąży zgodnie z ruchem wskazówek zegara i jest rozbieżny. Wyż to zwykle pogoda stabilna, słabszy wiatr i mniejsze zachmurzenie."},
{id:"m4", cat:"meteo", q:"Zgodnie z prawem Buys-Ballota na półkuli północnej, stojąc tyłem do wiatru, niż mamy:", opts:["po lewej ręce","po prawej ręce","prosto przed sobą"], correct:0, exp:"Tyłem do wiatru (NH) → niższe ciśnienie po LEWEJ ręce, wyższe po prawej. Pozwala to bez mapy oszacować, gdzie jest centrum niżu."},
{id:"m5", cat:"meteo", q:"Nadejście frontu ciepłego poprzedzają zwykle:", opts:["chmury narastające od wysokich (Ci, Cs) przez As do Ns, z długotrwałym, równym opadem","nagłe szkwały i chmury Cb","bezchmurne niebo i silny wiatr z północy"], correct:0, exp:"Front ciepły: powolne nasuwanie ciepłego powietrza, ciąg chmur Ci→Cs→As→Ns, długi, jednostajny deszcz, wiatr umiarkowany. Po przejściu ciśnienie przestaje spadać."},
{id:"m6", cat:"meteo", q:"Przejście frontu chłodnego charakteryzuje się najczęściej:", opts:["chmurami Cumulonimbus, szkwałami i przelotnymi, intensywnymi opadami, skokowym wzrostem ciśnienia po froncie","jednostajnym, wielogodzinnym deszczem bez wiatru","stopniowym rozpogodzeniem bez zmian wiatru"], correct:0, exp:"Front chłodny nasuwa się gwałtownie: chmury Cb, szkwały, burze, krótkie ulewy, zmiana (skręt) kierunku wiatru i wzrost ciśnienia po jego przejściu. Wymaga gotowości do refowania."},
{id:"m7", cat:"meteo", q:"Front zokludowany (okluzja) powstaje, gdy:", opts:["front chłodny dogania ciepły i unosi ciepłe powietrze nad powierzchnię","wyż łączy się z drugim wyżem","wiatr osiąga 12 w skali Beauforta"], correct:0, exp:"Okluzja to późne stadium niżu: szybszy front chłodny dogania ciepły, wypychając ciepłe powietrze w górę. Niż wtedy zwykle zanika (wypełnia się)."},
{id:"m8", cat:"meteo", q:"Skala Beauforta służy do określania:", opts:["siły (prędkości) wiatru","wysokości chmur","ciśnienia atmosferycznego"], correct:0, exp:"Skala Beauforta (0–12) opisuje siłę wiatru na podstawie jego skutków (na morzu i lądzie). 0 to cisza, 12 to huragan."},
{id:"m9", cat:"meteo", q:"Komunikat 'wiatr SW 5' oznacza wiatr:", opts:["wiejący Z kierunku południowo-zachodniego, o sile 5 w skali Beauforta","wiejący DO kierunku południowo-zachodniego","o prędkości 5 węzłów"], correct:0, exp:"Kierunek wiatru podaje się zawsze jako ten, SKĄD wieje. 'SW 5' = wiatr z południowego zachodu, 5°B (ok. 8–10,7 m/s, dość silny)."},
{id:"m10", cat:"meteo", q:"Bryza morska (dzienna) wieje:", opts:["znad morza w stronę lądu, w ciepłe dni","znad lądu w stronę morza","tylko nocą"], correct:0, exp:"W dzień ląd nagrzewa się szybciej, ciepłe powietrze unosi się nad lądem, a znad chłodnego morza napływa bryza morska (morze→ląd). Nocą jest odwrotnie."},
{id:"m11", cat:"meteo", q:"Bryza lądowa (nocna) wieje:", opts:["znad lądu w stronę morza","znad morza w stronę lądu","z zachodu na wschód"], correct:0, exp:"Nocą ląd wychładza się szybciej niż morze; powietrze spływa znad zimnego lądu ku cieplejszemu morzu — bryza lądowa (ląd→morze)."},
{id:"m12", cat:"meteo", q:"Chmury piętra wysokiego (np. Cirrus) zbudowane są głównie z:", opts:["kryształków lodu","kropelek wody przechłodzonej w postaci mgły przy ziemi","pyłu"], correct:0, exp:"Wysokie chmury (Ci, Cs, Cc) tworzą kryształki lodu. Cienkie Cirrusy ('pierzaste') często zapowiadają nadejście frontu ciepłego."},
{id:"m13", cat:"meteo", q:"Chmura Cumulonimbus (Cb) wiąże się z:", opts:["burzami, szkwałami i intensywnymi przelotnymi opadami","stabilną, słoneczną pogodą wyżową","mgłą radiacyjną"], correct:0, exp:"Cb to potężna chmura burzowa o silnych prądach pionowych. Zwiastuje szkwały, wyładowania, grad i gwałtowne zmiany wiatru — sygnał do natychmiastowego refowania."},
{id:"m14", cat:"meteo", q:"Szybki spadek ciśnienia rzędu kilku hPa w ciągu godziny zapowiada zwykle:", opts:["nadejście głębokiego niżu i silnego wiatru","długotrwałą ciszę","stabilną pogodę wyżową"], correct:0, exp:"Im szybszy spadek ciśnienia, tym gwałtowniejsze pogorszenie pogody i silniejszy wiatr. To sygnał do skrócenia żagli i rozważenia schronienia."},
{id:"m15", cat:"meteo", q:"Pliki GRIB wykorzystywane w żegludze zawierają:", opts:["numeryczne dane prognostyczne (m.in. wiatr, ciśnienie) do wyświetlenia w aplikacji nawigacyjnej","mapy papierowe akwenu","tablice pływów"], correct:0, exp:"GRIB to format danych prognozy numerycznej (wiatr, ciśnienie, fala). Wymaga krytycznej oceny: to model, nie obserwacja — należy go łączyć z komunikatami i własną obserwacją nieba."},
{id:"m16", cat:"meteo", q:"NAVTEX to system służący do:", opts:["automatycznego odbioru ostrzeżeń nawigacyjnych i meteorologicznych w formie tekstowej","pomiaru głębokości","wyznaczania pozycji"], correct:0, exp:"NAVTEX odbiera tekstowe ostrzeżenia nawigacyjne, meteorologiczne i SAR na falach średnich. To jeden z podstawowych kanałów informacji bezpieczeństwa w GMDSS."},
{id:"m17", cat:"meteo", q:"Mgła adwekcyjna na morzu powstaje, gdy:", opts:["ciepłe, wilgotne powietrze przemieszcza się nad chłodniejszą wodą i ochładza się poniżej punktu rosy","wiatr osiąga 8°B","ciśnienie gwałtownie rośnie"], correct:0, exp:"Gdy temperatura powietrza spadnie do punktu rosy, para skrapla się i powstaje mgła. Mgła adwekcyjna (napływowa) bywa rozległa i uporczywa — wymaga ostrożności i sygnałów mgłowych."},
{id:"m18", cat:"meteo", q:"Z niżem barycznym wiąże się zwykle pogoda:", opts:["pochmurna, z opadami i silniejszym wiatrem","sucha, słoneczna i bezwietrzna","wyłącznie mglista bez wiatru"], correct:0, exp:"Niż przynosi zachmurzenie, opady i wzmożony wiatr (zbieżność i wznoszenie powietrza). Dlatego pogłębiający się niż na mapie to sygnał ostrzegawczy dla żeglarza."},
{id:"m19", cat:"meteo", q:"Stan morza (skala stanu morza) opisuje przede wszystkim:", opts:["wysokość i charakter fal","ciśnienie atmosferyczne","temperaturę wody"], correct:0, exp:"Skala stanu morza (0–9) opisuje falowanie powierzchni. Jest powiązana z siłą i czasem działania wiatru oraz długością rozbiegu fali (fetch)."},
{id:"m20", cat:"meteo", q:"Przy prognozie sztormowej dla planowanego akwenu (np. wiatr 8–9°B) rozsądną decyzją skippera jest:", opts:["pozostać w porcie i wyjść po osłabnięciu wiatru","wyjść natychmiast, by 'wyprzedzić' sztorm","ignorować prognozę, jeśli niebo jest chwilowo czyste"], correct:0, exp:"Bezpieczeństwo przed planem: przy zapowiadanym sztormie pozostajemy w porcie schronienia. Decyzja o wyjściu zależy od jachtu, załogi i akwenu — nigdy od presji terminu."},

/* === PRZEPISY / MPZZM === */
{id:"p1", cat:"przepisy", q:"Międzynarodowe Przepisy o Zapobieganiu Zderzeniom na Morzu (MPZZM/COLREG) określają przede wszystkim:", opts:["zasady ruchu, prawo drogi, światła, znaki i sygnały statków","wysokość opłat portowych","wymagania na patenty żeglarskie"], correct:0, exp:"MPZZM to 'kodeks drogowy morza': prawo drogi, światła i znaki, sygnały dźwiękowe i mgłowe oraz zasady postępowania, by uniknąć kolizji."},
{id:"p2", cat:"przepisy", q:"W relacji jacht żaglowy — kuter rybacki w trakcie połowu pierwszeństwo ma:", opts:["jacht żaglowy","statek zajęty połowem (żaglowiec ustępuje)","ten, który płynie szybciej"], correct:1, exp:"Hierarchia uprzywilejowania (od najbardziej): nieodpowiadający za ruchy, o ograniczonej zdolności manewrowej, ograniczony zanurzeniem, zajęty połowem, żaglowy, motorowy. Żaglowiec ustępuje rybakowi w połowie."},
{id:"p3", cat:"przepisy", q:"Najmniej uprzywilejowanym (najczęściej ustępującym) uczestnikiem ruchu jest zwykle:", opts:["statek o napędzie mechanicznym (motorowy) w drodze","statek nieodpowiadający za swoje ruchy","statek zajęty połowem"], correct:0, exp:"Statek motorowy w drodze ustępuje niemal wszystkim pozostałym kategoriom. Najbardziej uprzywilejowany jest statek nieodpowiadający za swoje ruchy (NUC)."},
{id:"p4", cat:"przepisy", q:"Statek 'nieodpowiadający za swoje ruchy' (NUC) to taki, który:", opts:["wskutek awarii lub wyjątkowych okoliczności nie może manewrować zgodnie z przepisami","celowo nie ustępuje innym","stoi na kotwicy"], correct:0, exp:"NUC (np. awaria steru/napędu) nie jest w stanie zejść z drogi. Pokazuje dwa czerwone światła dookólne w pionie (w dzień dwie kule)."},
{id:"p5", cat:"przepisy", q:"Statek 'o ograniczonej zdolności manewrowej' (RAM) to np.:", opts:["statek wykonujący prace (pogłębiarka, układanie kabla), który ma utrudniony manewr","każdy statek motorowy","jacht płynący pod silnikiem"], correct:0, exp:"RAM z powodu charakteru pracy nie może swobodnie manewrować (prace podwodne, holowanie, układanie kabla). Światła: czerwone-białe-czerwone dookólne w pionie."},
{id:"p6", cat:"przepisy", q:"Gdy dwa jachty żaglowe mają wiatr z różnych burt, ustąpić powinien:", opts:["jacht na halsie lewym (wiatr z lewej burty)","jacht na halsie prawym","ten, który jest większy"], correct:0, exp:"Różne halsy: ustępuje jacht na halsie LEWYM (wiatr z lewej burty). Jacht na halsie prawym ma pierwszeństwo (utrzymuje kurs i prędkość)."},
{id:"p7", cat:"przepisy", q:"Gdy dwa jachty żaglowe mają wiatr z tej samej burty (ten sam hals), ustępuje:", opts:["jacht znajdujący się od nawietrznej (bliżej wiatru)","jacht od zawietrznej","zawsze mniejszy jacht"], correct:0, exp:"Ten sam hals: jacht od NAWIETRZNEJ ustępuje jachtowi od zawietrznej. Zawietrzny ma pierwszeństwo, bo jest 'zasłaniany' i mniej manewrowy względem wiatru."},
{id:"p8", cat:"przepisy", q:"Jacht jest na halsie prawym (uprzywilejowanym wobec halsu lewego), gdy:", opts:["wiatr wieje od jego prawej burty (bom wyłożony na lewą)","wiatr wieje od jego lewej burty","płynie kursem fordewind"], correct:0, exp:"Hals określa burta, z której wieje wiatr. Hals prawy = wiatr z prawej burty (bom na lewej). Przy spotkaniu hals prawy ustępuje tylko nielicznym, hals lewy ustępuje halsowi prawemu."},
{id:"p9", cat:"przepisy", q:"Dwa statki motorowe zbliżają się kursami wprost na siebie (dziób w dziób). Powinny:", opts:["oba odwrócić w prawo (przepuścić się lewymi burtami)","oba odwrócić w lewo","utrzymać kurs i przyspieszyć"], correct:0, exp:"Sytuacja 'na wprost': każdy zmienia kurs w PRAWO, by minąć się lewymi burtami. To jedna z podstawowych zasad prawa drogi statków motorowych."},
{id:"p10", cat:"przepisy", q:"Dwa statki motorowe na kursach krzyżujących się — ustąpić powinien ten, który:", opts:["widzi drugi statek po swojej prawej burcie (sterburcie)","widzi drugi statek po lewej burcie","jest mniejszy"], correct:0, exp:"Na kursach krzyżujących ustępuje statek mający drugiego po swojej PRAWEJ stronie (przepuszcza go przed dziobem, zwykle zmieniając kurs w prawo lub redukując prędkość)."},
{id:"p11", cat:"przepisy", q:"Przy wyprzedzaniu (jeden statek dogania drugi) z drogi schodzi:", opts:["statek wyprzedzający, niezależnie od rodzaju napędu","statek wyprzedzany","zawsze statek żaglowy"], correct:0, exp:"Wyprzedzający ZAWSZE ustępuje wyprzedzanemu, nawet żaglowiec doganiający motorówkę. Status wyprzedzania trwa do całkowitego minięcia i oddalenia."},
{id:"p12", cat:"przepisy", q:"Jacht żaglowy, który płynie na żaglach i jednocześnie używa silnika, jest traktowany jako:", opts:["statek o napędzie mechanicznym (motorowy)","statek żaglowy","statek o ograniczonej zdolności manewrowej"], correct:0, exp:"Żagle + silnik = statek motorowy (z odpowiednimi obowiązkami w prawie drogi). W dzień pokazuje znak: stożek wierzchołkiem w DÓŁ, na dziobie."},
{id:"p13", cat:"przepisy", q:"Światła nawigacyjne należy nosić:", opts:["od zachodu do wschodu słońca oraz w ograniczonej widzialności","tylko w portach","tylko podczas sztormu"], correct:0, exp:"Światła obowiązują od zachodu do wschodu słońca, a także w dzień przy ograniczonej widzialności (mgła, ulewa). W dzień zamiast świateł stosuje się znaki (kule, stożki, walce)."},
{id:"p14", cat:"przepisy", q:"Statek o napędzie mechanicznym w drodze (poniżej 50 m) pokazuje w nocy:", opts:["światło masztowe białe, światła burtowe (czerwone/zielone) i światło rufowe białe","dwa czerwone światła dookólne","zielone nad białym"], correct:0, exp:"Motorowy w drodze: maszt białe + burtowe (lewa czerwona, prawa zielona) + rufowe białe. Jednostki ≥50 m noszą dodatkowo drugie, wyższe światło masztowe."},
{id:"p15", cat:"przepisy", q:"Światła burtowe statku to:", opts:["czerwone na lewej (bakburta) i zielone na prawej (sterburta) burcie","zielone na lewej, czerwone na prawej","oba białe"], correct:0, exp:"Lewa burta = czerwone, prawa = zielone (sektor po 112,5°). Stąd 'widzę zielone' oznacza, że patrzymy na prawą burtę statku — jak na pławach prawej strony toru."},
{id:"p16", cat:"przepisy", q:"Światło rufowe statku jest:", opts:["białe, świecące w sektorze ku rufie (135°)","czerwone, dookólne","zielone, ku dziobowi"], correct:0, exp:"Światło rufowe jest białe i obejmuje sektor 135° z tyłu. Widząc tylko białe światło rufowe, najpewniej doganiamy inny statek (jesteśmy wyprzedzający)."},
{id:"p17", cat:"przepisy", q:"Statek na kotwicy (poniżej 50 m) pokazuje:", opts:["jedno białe światło dookólne (w dzień: czarną kulę na dziobie)","dwa czerwone światła","zielone nad białym"], correct:0, exp:"Na kotwicy: białe światło dookólne (większe jednostki dodatkowo drugie, niżej w rufowej części). W dzień na dziobie wywiesza się czarną kulę."},
{id:"p18", cat:"przepisy", q:"Dwa czerwone światła dookólne w pionie (w dzień dwie kule) oznaczają statek:", opts:["nieodpowiadający za swoje ruchy (NUC)","na kotwicy","zajęty połowem"], correct:0, exp:"Dwa czerwone dookólne = NUC (np. awaria). Taki statek jest mocno uprzywilejowany — to inni schodzą mu z drogi, bo on nie może manewrować."},
{id:"p19", cat:"przepisy", q:"Sekwencja świateł dookólnych czerwone-białe-czerwone (w pionie) oznacza statek:", opts:["o ograniczonej zdolności manewrowej (RAM)","na mieliźnie","poławiający"], correct:0, exp:"Czerwone-białe-czerwone = ograniczona zdolność manewrowa (RAM), np. prace podwodne, holowanie specjalne. Należy zachować od niego dużą odległość."},
{id:"p20", cat:"przepisy", q:"Statek poławiający trałem (trawler) pokazuje dookólne:", opts:["zielone nad białym","czerwone nad białym","białe nad czerwonym"], correct:0, exp:"Trawler: ZIELONE nad białym. Inny połów (np. dryfujące sieci) pokazuje CZERWONE nad białym. Zapamiętaj: 'green over white = trawling'."},
{id:"p21", cat:"przepisy", q:"Statek pełniący służbę pilotową pokazuje światła dookólne:", opts:["białe nad czerwonym","zielone nad białym","czerwone nad czerwonym"], correct:0, exp:"Pilot: BIAŁE nad czerwonym ('white over red, pilot ahead'). Jednostka pilotowa w służbie ma charakterystyczny układ dwóch świateł dookólnych na maszcie."},
{id:"p22", cat:"przepisy", q:"Jeden krótki sygnał dźwiękowy oznacza:", opts:["zmieniam swój kurs w prawo","zmieniam swój kurs w lewo","pracuję wstecz maszynami"], correct:0, exp:"1 krótki = 'odwracam w prawo (sterburta)'. 2 krótkie = 'odwracam w lewo'. 3 krótkie = 'pracuję maszynami wstecz'."},
{id:"p23", cat:"przepisy", q:"Trzy krótkie sygnały dźwiękowe oznaczają:", opts:["pracuję maszynami wstecz","zmieniam kurs w lewo","ostrzeżenie o niebezpieczeństwie"], correct:0, exp:"3 krótkie = praca maszyn wstecz (statek hamuje/cofa). To sygnał manewrowy w zasięgu wzrokowym, nadawany na bieżąco z wykonywanym manewrem."},
{id:"p24", cat:"przepisy", q:"Co najmniej pięć krótkich, szybkich sygnałów dźwiękowych oznacza:", opts:["wątpliwość lub ostrzeżenie o niebezpieczeństwie zderzenia","wezwanie pilota","zgodę na wyprzedzanie"], correct:0, exp:"5+ krótkich szybkich = sygnał wątpliwości/ostrzegawczy ('nie rozumiem twoich zamiarów' lub 'uwaga, niebezpieczeństwo'). Stosuje się, gdy manewry drugiego statku są niejasne."},
{id:"p25", cat:"przepisy", q:"W ograniczonej widzialności statek o napędzie mechanicznym, mający ruch w wodzie, nadaje:", opts:["jeden długi sygnał w odstępach nie większych niż 2 minuty","rapidne uderzenia w dzwon","trzy krótkie sygnały"], correct:0, exp:"Ograniczona widzialność, motorowy w drodze i z ruchem: 1 długi co najwyżej co 2 min. Gdy zatrzymany (bez ruchu w wodzie): 2 długie w odstępach do 2 min."},
{id:"p26", cat:"przepisy", q:"W ograniczonej widzialności statek żaglowy (a także poławiający, RAM, holujący) nadaje:", opts:["jeden długi i dwa krótkie sygnały, w odstępach do 2 minut","sam dźwięk dzwonu","pięć krótkich sygnałów"], correct:0, exp:"Żaglowy/połów/RAM/holujący/ograniczony zanurzeniem we mgle: 1 długi + 2 krótkie co najwyżej co 2 min. Ten sam sygnał dla całej grupy uprzywilejowanej."},
{id:"p27", cat:"przepisy", q:"Statek na kotwicy w ograniczonej widzialności sygnalizuje swoją obecność:", opts:["szybkim biciem w dzwon przez ok. 5 s, w odstępach do 1 minuty","jednym długim sygnałem","trzema krótkimi sygnałami"], correct:0, exp:"Na kotwicy we mgle: szybkie bicie w dzwon ~5 s, co najwyżej co minutę (na większych jednostkach uzupełnione gongiem od rufy). Ostrzega to innych o stojącej przeszkodzie."},
{id:"p28", cat:"przepisy", q:"Polski jacht morski uprawiający żeglugę powinien m.in.:", opts:["nieść banderę, posiadać dokument rejestracyjny, a prowadzący — odpowiedni patent i wymagane ubezpieczenia/dokumenty","mieć wyłącznie GPS","nie potrzebuje żadnych dokumentów na wodach krajowych"], correct:0, exp:"Wymaga się m.in.: rejestracji jachtu i dokumentu jachtu, noszenia bandery, patentu odpowiedniego do żeglugi (np. JSM), karty bezpieczeństwa dla jednostek jej podlegających oraz aktualnych dokumentów załogi. Szczegóły regulują polskie przepisy — należy je weryfikować."},

/* === RATOWNICTWO I BEZPIECZEŃSTWO === */
{id:"r1", cat:"ratownictwo", q:"Dobrze dobrana kamizelka ratunkowa powinna mieć m.in.:", opts:["kołnierz utrzymujący głowę nad wodą, pas krokowy, gwizdek i światło","wyłącznie jaskrawy kolor","tylko duży zapas pływalności bez pasów"], correct:0, exp:"Kamizelka ratunkowa odwraca twarzą do góry i utrzymuje głowę nad wodą; pas krokowy zapobiega zsunięciu, gwizdek i światło ułatwiają odnalezienie. Kapok pęczniejący ma większą wyporność niż pas asekuracyjny."},
{id:"r2", cat:"ratownictwo", q:"Pas krokowy (między nogami) w kamizelce ratunkowej służy do tego, by:", opts:["kamizelka nie zsunęła się przez głowę po wpadnięciu do wody","zwiększyć wyporność","zamocować szelki bezpieczeństwa"], correct:0, exp:"Bez pasa krokowego siła wyporu może ściągnąć kamizelkę przez głowę. Pas utrzymuje ją na ciele — to element często pomijany, a krytyczny."},
{id:"r3", cat:"ratownictwo", q:"Koło ratunkowe na jachcie powinno być wyposażone m.in. w:", opts:["pływającą linkę (rzutkę) oraz — przynajmniej jedno — światło samozapalające","kotwicę","racę spadochronową"], correct:0, exp:"Zestaw kół: jedno z pływającą linką ~30 m do podania, jedno ze światłem samozapalającym (świeci kilkadziesiąt minut) i pławką dymną. Koła montuje się tak, by można je było natychmiast zrzucić."},
{id:"r4", cat:"ratownictwo", q:"Koło ratunkowe człowiekowi w wodzie rzucamy:", opts:["na nawietrzną (od strony wiatru), aby dryfowało w jego stronę","prosto na niego z dużej odległości","na zawietrzną, by płynął pod wiatr"], correct:0, exp:"Koło rzucamy na nawietrzną od człowieka — wiatr i fala zniosą je ku niemu. Rzucone na zawietrzną odpłynie i będzie nieosiągalne."},
{id:"r5", cat:"ratownictwo", q:"Tratwa ratunkowa w kontenerze mocowana jest zwykle przez zwalniak hydrostatyczny, który:", opts:["samoczynnie uwalnia tratwę po zatonięciu jachtu na niewielkiej głębokości","blokuje tratwę na stałe","służy do napompowania tratwy ręcznie"], correct:0, exp:"Zwalniak hydrostatyczny uwalnia kontener pod naporem wody (zwykle ok. 1,5–4 m), gdy jacht tonie. Tratwę można też zwolnić ręcznie, zrzucić na zawietrzną i napełnić, pociągając linkę inicjującą."},
{id:"r6", cat:"ratownictwo", q:"Tratwę ratunkową przed zrzuceniem należy:", opts:["przymocować linkę inicjującą do jachtu i zrzucać na zawietrzną burtę","odwiązać całkowicie i wrzucić na nawietrzną","napompować na pokładzie przed zrzuceniem"], correct:0, exp:"Linka inicjująca (fał) musi być przypięta do jachtu — jej pociągnięcie napełnia tratwę (po ~1 min). Zrzucamy na zawietrzną, by tratwa nie była znoszona na kadłub. Linka inicjująca to nie cuma — w razie tonięcia trzeba ją odciąć."},
{id:"r7", cat:"ratownictwo", q:"Czerwona raca/rakieta pirotechniczna oznacza:", opts:["wzywanie pomocy (sygnał niebezpieczeństwa)","oświetlenie terenu","sygnał startu w regatach"], correct:0, exp:"Czerwony ogień pirotechniczny = sygnał wzywania pomocy/niebezpieczeństwa. Biały służy do oświetlenia lub zwrócenia uwagi (np. ostrzeżenie przed kolizją), nie jest sygnałem SOS."},
{id:"r8", cat:"ratownictwo", q:"Pławka dymna (pomarańczowy dym) jest sygnałem wzywania pomocy stosowanym przede wszystkim:", opts:["w dzień, dobrze widocznym z powietrza i z daleka","wyłącznie w nocy","do oświetlenia pokładu"], correct:0, exp:"Pomarańczowy dym to dzienny sygnał niebezpieczeństwa, czytelny dla statków i statków powietrznych SAR. W nocy skuteczniejsze są czerwone race i rakiety spadochronowe."},
{id:"r9", cat:"ratownictwo", q:"Wywołanie MAYDAY na VHF nadajemy, gdy:", opts:["występuje bezpośrednie zagrożenie życia lub jachtu (najwyższy priorytet)","chcemy sprawdzić zasięg radia","potrzebujemy informacji o pogodzie"], correct:0, exp:"MAYDAY (×3) to sygnał najwyższej kategorii — bezpośrednie, poważne niebezpieczeństwo dla życia/jednostki. Nadaje się go na kanale 16 i/lub przez DSC."},
{id:"r10", cat:"ratownictwo", q:"Wywołanie PAN-PAN oznacza:", opts:["komunikat pilny dotyczący bezpieczeństwa, bez bezpośredniego zagrożenia życia","wezwanie najwyższego priorytetu (zagrożenie życia)","zwykłą rozmowę między jachtami"], correct:0, exp:"PAN-PAN (×3) to kategoria pilności (np. awaria bez zagrożenia życia, problem zdrowotny pod kontrolą). Niżej od MAYDAY, wyżej od zwykłej korespondencji."},
{id:"r11", cat:"ratownictwo", q:"Kanałem ratunkowym i wywoławczym w morskiej radiotelefonii VHF jest kanał:", opts:["16","72","6"], correct:0, exp:"Kanał 16 (156,8 MHz) to międzynarodowy kanał wzywania pomocy i bezpieczeństwa, stale nasłuchiwany. Po nawiązaniu łączności przechodzi się na kanał roboczy."},
{id:"r12", cat:"ratownictwo", q:"Radiopława awaryjna EPIRB po aktywacji:", opts:["nadaje sygnał alarmowy z pozycją do satelitarnego systemu poszukiwania i ratownictwa","emituje światło ostrzegawcze dla innych jachtów","mierzy głębokość wody"], correct:0, exp:"EPIRB wysyła sygnał z identyfikatorem (i pozycją z GPS) do systemu Cospas-Sarsat, uruchamiając akcję SAR. Wiele modeli aktywuje się samoczynnie po kontakcie z wodą (zwalniak hydrostatyczny)."},
{id:"r13", cat:"ratownictwo", q:"U osoby z hipotermią (wychłodzeniem) przytomnej i mogącej przełykać należy:", opts:["zapobiegać dalszej utracie ciepła, podać ciepłe, słodkie napoje (bez alkoholu) i obchodzić się z nią delikatnie","podać alkohol dla rozgrzania","intensywnie rozcierać kończyny śniegiem"], correct:0, exp:"W hipotermii: izolacja od zimna (koc/folia NRC), ciepłe słodkie napoje jeśli przytomna, delikatne ruchy (gwałtowne mogą wywołać zaburzenia serca), pomoc medyczna. Alkohol rozszerza naczynia i pogłębia wychłodzenie."},
{id:"r14", cat:"ratownictwo", q:"Resuscytację krążeniowo-oddechową (RKO) u dorosłego prowadzi się w cyklu:", opts:["30 uciśnięć klatki piersiowej na 2 oddechy ratownicze","15 uciśnięć na 1 oddech","5 uciśnięć na 5 oddechów"], correct:0, exp:"Standard RKO dorosłego: 30 uciśnięć (tempo ~100–120/min, głębokość ~5–6 cm) i 2 oddechy. Kontynuujemy do przybycia pomocy lub powrotu oznak życia."},
{id:"r15", cat:"ratownictwo", q:"Wyciągniętą z wody, nieprzytomną osobę w pierwszej kolejności należy:", opts:["sprawdzić oddech (i drożność dróg oddechowych) i w razie braku rozpocząć RKO","natychmiast podać ciepły napój","posadzić i czekać na pomoc"], correct:0, exp:"Po wyłowieniu nieprzytomnego: ocena reakcji, udrożnienie dróg oddechowych, sprawdzenie oddechu. Brak prawidłowego oddechu → wezwanie pomocy i RKO. Nieprzytomnemu nie podaje się płynów."},
{id:"r16", cat:"ratownictwo", q:"Do gaszenia pożaru silnika w komorze należy:", opts:["wyłączyć silnik, odciąć dopływ paliwa, nie otwierać szeroko luku i podać gaśnicę przez mały otwór","natychmiast szeroko otworzyć luk, by 'wypuścić' ogień","polać silnik wodą zaburtową"], correct:0, exp:"Szerokie otwarcie luku dostarcza tlenu i wzmaga pożar. Wyłączamy silnik i odcinamy paliwo, podajemy gaśnicę (proszkową/CO2/gaz gaśniczy) przez szczelinę, dopiero potem ostrożnie sprawdzamy. Wodą nie gasimy instalacji elektrycznej/paliwa."},
{id:"r17", cat:"ratownictwo", q:"Sygnałem wzywania pomocy zgodnym z przepisami jest m.in.:", opts:["powolne podnoszenie i opuszczanie ramion wyciągniętych w bok","machanie jedną ręką nad głową","trzykrotne mignięcie latarką w dowolnym rytmie"], correct:0, exp:"Do uznanych sygnałów należą m.in.: powolne unoszenie i opuszczanie wyprostowanych ramion, kwadratowa flaga z kulą, ciągły sygnał dźwiękowy, czerwone race/rakiety, pomarańczowy dym, SOS, MAYDAY, EPIRB."},
{id:"r18", cat:"ratownictwo", q:"Tlący się materiał izolacyjny przy przewodach elektrycznych na jachcie wymaga przede wszystkim:", opts:["odłączenia zasilania (akumulatora) i ugaszenia zarzewia","polania wodą bez odłączania prądu","otwarcia wszystkich luków dla przewiewu"], correct:0, exp:"Najpierw odłączamy źródło prądu (rozłącznik/akumulator), by przerwać zwarcie i ryzyko porażenia, dopiero potem gasimy (gaśnica, koc gaśniczy). Polewanie wodą instalacji pod napięciem grozi porażeniem."},

/* === MANEWRY I PLANOWANIE REJSU === */
{id:"mn1", cat:"manewry", q:"Na biegu wstecznym jacht z typową śrubą prawoskrętną zachowuje się tak, że:", opts:["rufa ucieka w lewo (na lewą burtę)","rufa ucieka w prawo","jacht idzie idealnie prosto"], correct:0, exp:"Strumień zaśrubowy śruby prawoskrętnej na wstecznym znosi rufę w LEWO. Manewry portowe planuje się tak, by ten efekt pomagał (np. dobić lewą burtą)."},
{id:"mn2", cat:"manewry", q:"Znajomość efektu śruby przy odbijaniu od nabrzeża pozwala:", opts:["tak ustawić manewr (burtę dobicia), by śruba pomagała odprowadzić rufę","całkowicie zignorować wiatr","zrezygnować z użycia steru"], correct:0, exp:"Świadomie wykorzystując znoszenie rufy oraz pracę na 'krótkich gazach' z wychylonym sterem, łatwiej odprowadzić rufę i wyjść z ciasnego miejsca. Zawsze uwzględniamy też wiatr i prąd."},
{id:"mn3", cat:"manewry", q:"Zacieśnianie cyrkulacji (ciaśniejszy obrót jachtu motorowego w miejscu) uzyskuje się przez:", opts:["krótkie 'kopnięcia' silnikiem naprzód przy sterze wychylonym do oporu","ciągły bieg wsteczny","wyłączenie silnika i dryfowanie"], correct:0, exp:"Krótki impuls naprzód przy sterze 'na burtę' daje silną strugę na płetwie i obraca dziób, prawie bez ruchu naprzód. Powtarzając, obracamy jacht w bardzo ciasnym miejscu."},
{id:"mn4", cat:"manewry", q:"Szpringi przy cumowaniu burtą służą do tego, by jacht:", opts:["nie przesuwał się wzdłuż nabrzeża (do przodu i do tyłu)","nie odchylał dziobu od kei","nie tonął przy nabrzeżu"], correct:0, exp:"Cumy dziobowa i rufowa trzymają jacht przy kei, a szpringi (skośne) blokują ruch wzdłużny. Pracując na szpringu, można też sterować odejściem dziobu lub rufy od nabrzeża."},
{id:"mn5", cat:"manewry", q:"Zwrot przez sztag (zwrot na wiatr) polega na przeprowadzeniu:", opts:["dziobu jachtu przez linię wiatru","rufy jachtu przez linię wiatru","jachtu w bok bez zmiany halsu"], correct:0, exp:"Zwrot przez sztag: dziób przechodzi przez wiatr, żagle przekładają się na drugą burtę. Komendy: 'Do zwrotu przez sztag — gotuj!', a następnie 'Zwrot!'. To podstawowy zwrot przy halsowaniu pod wiatr."},
{id:"mn6", cat:"manewry", q:"Zwrot przez rufę (przez fordewind) jest groźniejszy od zwrotu przez sztag, ponieważ:", opts:["bom gwałtownie przerzuca się na drugą burtę (ryzyko urazu i uszkodzeń) — zwłaszcza przy silnym wietrze","jacht traci całą prędkość","nie można go wykonać na kursie pełnym"], correct:0, exp:"Przy zwrocie przez rufę rufa przechodzi linię wiatru i bom przerzuca się z dużą siłą. Aby zapanować nad manewrem, wybiera się grota przed przejściem i kontrolowanie luzuje po drugiej stronie; przy silnym wietrze bywa ryzykowny."},
{id:"mn7", cat:"manewry", q:"Stawanie w dryf (leżenie w dryfie) uzyskuje się m.in. przez:", opts:["wybranie foka na przeciwną burtę (na backstag), wyluzowanie grota i ster ku nawietrznej","postawienie spinakera","maksymalne wybranie wszystkich żagli"], correct:0, exp:"W dryfie fok pracuje 'na opak' (na nawietrzną), grot jest wyluzowany, a ster odwrócony ku nawietrznej. Jacht niemal stoi i wolno dryfuje — przydatne do odpoczynku, refowania czy oczekiwania na poprawę warunków."},
{id:"mn8", cat:"manewry", q:"Refowanie żagli najlepiej wykonać:", opts:["zawczasu, zanim wiatr przybierze na sile i wymusi to w trudnych warunkach","dopiero gdy jacht mocno się przechyla i nabiera wody","wyłącznie po zmroku"], correct:0, exp:"Zasada: 'jeśli myślisz o refowaniu — już czas refować'. Skrócenie żagli w spokojniejszych warunkach jest bezpieczne i łatwe; odkładanie do szkwału bywa niebezpieczne."},
{id:"mn9", cat:"manewry", q:"Średni dobowy przelot 12-metrowego jachtu turystycznego przyjmuje się orientacyjnie na:", opts:["ok. 100 Mm na dobę","ok. 300 Mm na dobę","ok. 20 Mm na dobę"], correct:0, exp:"Do planowania etapów przyjmuje się ~100 Mm/dobę dla takiego jachtu (zależnie od wiatru, prądu i załogi). To wartość orientacyjna — zawsze zostawiamy zapas czasu i paliwa."},
{id:"mn10", cat:"manewry", q:"Halsowanie pod wiatr (dopływanie do celu leżącego na wiatr) wydłuża pokonywaną drogę o około:", opts:["40% (kąt martwy ~90°)","5%","200%"], correct:0, exp:"Płynąc zygzakiem (bejdewind po obu halsach, łączny kąt martwy ~90°), pokonujemy ok. 40% drogi więcej niż w linii prostej. Uwzględniamy to w czasie i zapasach na trasie pod wiatr."},
{id:"mn11", cat:"manewry", q:"Orientacyjna długość wydanego łańcucha kotwicznego w dobrych warunkach to:", opts:["3–5-krotność głębokości w miejscu kotwiczenia","równa głębokości","dziesięciokrotność długości jachtu"], correct:0, exp:"Przy spokojnej pogodzie i dobrym dnie daje się 3–5× głębokość (więcej przy wietrze/fali). Na 8 m głębokości to ok. 30–40 m. Liczy się trzymanie poziomego odcinka łańcucha przy dnie."},
{id:"mn12", cat:"manewry", q:"Podchodząc do nabrzeża na silniku, należy:", opts:["płynąć powoli, z prędkością pozwalającą zatrzymać jacht, i uwzględnić wiatr oraz prąd","podejść z dużą prędkością i gwałtownie zahamować","wyłączyć silnik na podejściu i dryfować"], correct:0, exp:"Manewruje się 'tak wolno, jak to możliwe, i tak szybko, jak to konieczne'. Rozpędzony jacht nie ma hamulców. Zawsze planujemy znos od wiatru/prądu i mamy przygotowane cumy oraz odbijacze."},
{id:"mn13", cat:"manewry", q:"Przy odbijaniu od nabrzeża z wiatrem dociskającym na keję pomocne jest:", opts:["odepchnięcie dziobu lub odprowadzenie rufy z pracą na szpringu i odbijaczu","wyłącznie mocne wybranie cum","czekanie, aż wiatr zmieni kierunek"], correct:0, exp:"Gdy wiatr dociska burtę do kei, samo cofnięcie nie wystarczy. Pracując na szpringu (z odbijaczem na narożu) odprowadza się dziób lub rufę od nabrzeża, a następnie wychodzi przodem lub tyłem na czystą wodę."},
{id:"mn14", cat:"manewry", q:"Liny spinakera (na kursach pełnych) to m.in.:", opts:["bras, kontrabras/topenanta i szoty","wyłącznie cumy i szpringi","forsztag i achtersztag"], correct:0, exp:"Spinakerem steruje się brasem (ustawia spinakerbom), kontrabrasem i topenantą (pozycja bomu) oraz szotami (kąt natarcia żagla). Manewry spinakerem wymagają wprawy — łatwo o przeciążenie i wywrotkę na fali."},
{id:"mn15", cat:"manewry", q:"Planując trasę rejsu morskiego, porty schronienia dobiera się głównie pod kątem:", opts:["szerokości i głębokości wejścia oraz możliwości manewrowych w trudnych warunkach","najniższych opłat portowych","liczby restauracji w porcie"], correct:0, exp:"Port schronienia musi być osiągalny i bezpieczny w pogorszonej pogodzie: odpowiednio szerokie i głębokie wejście, brak utrudnień przy silnym wietrze, miejsce do manewru. To element planu na wypadek złych warunków."},
{id:"mn16", cat:"manewry", q:"Podstawą bezpiecznego planowania rejsu (oprócz oceny pogody) jest:", opts:["komplet aktualnych map i publikacji oraz realna ocena możliwości jachtu i załogi","wyłącznie zaufanie do plotera GPS","jak najkrótszy czas przejścia bez rezerw"], correct:0, exp:"Dobry plan to: aktualne mapy/locje/spisy świateł, ocena pogody i pływów, wyznaczone porty schronienia, realny dobowy przelot z zapasem oraz dostosowanie ambicji do umiejętności załogi i stanu jachtu."},

{cat:"ratownictwo", front:"Tratwa — wodowanie", back:"Linkę inicjującą przypiąć do jachtu, zrzucać na ZAWIETRZNĄ, pociągnąć linkę (napełnia po ~1 min). To nie cuma — odciąć przy tonięciu."},
{cat:"ratownictwo", front:"Pirotechnika — czerwona", back:"Wzywanie pomocy (sygnał niebezpieczeństwa)."},

{cat:"ratownictwo", front:"Hipotermia — postępowanie", back:"Izolacja od zimna, ciepłe SŁODKIE napoje (jeśli przytomny), delikatne ruchy, pomoc medyczna. BEZ alkoholu."},
{cat:"ratownictwo", front:"RKO dorosłego", back:"30 uciśnięć : 2 oddechy. Tempo ~100–120/min, głębokość ~5–6 cm."},

{cat:"manewry", front:"Cumy vs szpringi", back:"Cumy (dziob./ruf.) trzymają jacht przy kei; szpringi (skośne) blokują ruch wzdłuż nabrzeża."},

{cat:"manewry", front:"Porty schronienia — dobór", back:"Decydują szerokość i głębokość wejścia oraz możliwości manewru w trudnych warunkach."},

/* schema: {id, cat, title, intro, steps:[...]} */
const PRACTICAL = [
{id:"mob_zagle", cat:"ratownictwo", title:"Człowiek za burtą — pod żaglami", intro:"Cel: jak najszybciej wrócić do człowieka i bezpiecznie podjąć go na zawietrznej. Liczą się pierwsze sekundy i nieustanny kontakt wzrokowy obserwatora.",
 steps:["Głośny alarm: 'CZŁOWIEK ZA BURTĄ!' — cała załoga na pokład.","Natychmiast rzuć koło/pławę/tykę na NAWIETRZNĄ od człowieka (dryf zniesie sprzęt ku niemu).","Wyznacz OBSERWATORA, który bez przerwy wskazuje ręką człowieka i nie robi nic innego.","Naciśnij MOB na ploterze/GPS (zapis pozycji, namiar i odległość powrotna).","Wykonaj zwrot powrotny (np. zwrot przez sztag) i wróć do człowieka kursem pozwalającym podejść od ZAWIETRZNEJ na wytracaniu prędkości.","Podejdź dziobem lekko na wiatr, wytrać prędkość (żagle w łopot / stań w dryf przy burcie).","Podaj koło/linę, nawiąż kontakt, a następnie podejmij osobę przez najniższą część burty / rufę / drabinkę.","Po podjęciu: oceń stan, zabezpiecz przed wychłodzeniem, w razie potrzeby wezwij pomoc (PAN-PAN/MAYDAY)."]},
{id:"mob_silnik", cat:"ratownictwo", title:"Człowiek za burtą — na silniku", intro:"Manewr na silniku bywa szybszy, ale uwaga na śrubę — w pobliżu człowieka pracujemy nią z najwyższą ostrożnością.",
 steps:["Alarm 'CZŁOWIEK ZA BURTĄ!', rzuć środek wypornościowy na nawietrzną, wyznacz obserwatora, MOB na GPS.","Jeśli żagle przeszkadzają — zluzuj/opuść je, by zapanować nad jachtem na silniku.","Podchodź do człowieka od ZAWIETRZNEJ, dziobem na wiatr/falę, powoli i z kontrolą.","Gdy człowiek jest blisko burty — wrzuć silnik na LUZ (zatrzymaj śrubę), aby nie zranić go śrubą.","Podaj linę/koło, utrzymuj kontakt; podejmij osobę przez niską burtę/rufę/drabinkę.","Zabezpiecz przed hipotermią, oceń stan, w razie potrzeby wezwij pomoc."]},
{id:"tratwa", cat:"ratownictwo", title:"Wodowanie tratwy ratunkowej", intro:"Tratwę opuszczamy dopiero, gdy jacht realnie tonie ('wchodź na tratwę krokiem w górę', tj. dopiero gdy pokład schodzi pod wodę). Najpierw wezwij pomoc i zabierz wyposażenie awaryjne.",
 steps:["Włóż kamizelki/ubrania ciepłe, zabierz grab-bag (dokumenty, woda, race, EPIRB, latarka, radio).","Nadaj wezwanie MAYDAY (kanał 16 / DSC), aktywuj EPIRB.","Sprawdź, że linka inicjująca tratwy jest przymocowana do mocnego punktu na jachcie.","Zrzuć kontener z tratwą na ZAWIETRZNĄ burtę (by tratwy nie znosiło na kadłub).","Pociągnij energicznie linkę inicjującą — tratwa napełni się po ok. 1 minucie.","Przyciągnij tratwę do burty; wchodź do niej możliwie SUCHO, najlepiej nie wchodząc do wody.","Po wejściu wszystkich — ODETNIJ linkę/cumę łączącą z tonącym jachtem (nożem z wyposażenia tratwy).","Odpłyń kawałek od jachtu, zarzuć kotew dryfkotwę, zabezpiecz wejście, zbierz tabletki na chorobę morską, racjonuj wodę, czekaj na SAR."]},
{id:"sztorm", cat:"ratownictwo", title:"Przygotowanie jachtu do sztormu", intro:"Najlepsza taktyka sztormowa to nie wyjść w sztorm. Jeśli jednak złapie nas pogorszenie — kluczowe są: skrócenie żagli zawczasu, zabezpieczenie jachtu i asekuracja załogi.",
 steps:["Sprawdź prognozę i pozycję; jeśli to możliwe — skieruj się do portu schronienia lub na bezpieczny akwen.","Zrefuj żagle ZAWCZASU (mniejszy żagiel przedni, refy w grocie), zanim wiatr przybierze.","Zamknij i zabezpiecz luki, bulaje, zawory denne; usuń lub przymocuj luźny sprzęt na pokładzie i pod pokładem.","Cała załoga w kamizelkach i szelkach, wpięta do lin ratunkowych (jackstay); ogranicz wyjścia na pokład ('jedna ręka dla jachtu').","Przygotuj pompy zęzowe, latarki, race, radio; naładuj akumulatory, sprawdź paliwo.","Podaj załodze posiłek/napój i tabletki na chorobę morską, póki da się to zrobić; ustal wachty.","Wybierz taktykę: ucieczka na wiatr/zawietrzną, leżenie w dryfie (stawanie w dryf), dryfkotwa lub sztormowanie z silnikiem — zależnie od jachtu i akwenu.","Prowadź nawigację i zliczanie; trzymaj się z dala od brzegu i mielizn (brzeg zawietrzny jest najgroźniejszy)."]},
{id:"mayday", cat:"ratownictwo", title:"Wezwanie MAYDAY (VHF)", intro:"MAYDAY nadajemy przy bezpośrednim zagrożeniu życia lub jachtu. Jeśli radio ma DSC — najpierw naciśnij przycisk DISTRESS, potem nadaj głosem na kanale 16.",
 steps:["Jeśli możliwe: naciśnij i przytrzymaj przycisk DISTRESS (DSC) — wyśle alarm z pozycją i identyfikatorem (MMSI).","Ustaw kanał 16 i pełną moc; weź mikrofon.","Powiedz: 'MAYDAY, MAYDAY, MAYDAY'.","'Tu (nazwa jachtu) ×3' oraz znak wywoławczy / MMSI.","Podaj POZYCJĘ (współrzędne lub namiar i odległość od znanego punktu).","Podaj RODZAJ zagrożenia (np. wywrotka, pożar, tonięcie, człowiek za burtą).","Podaj liczbę osób na pokładzie i potrzebny rodzaj pomocy.","Zakończ słowem 'ODBIÓR' i nasłuchuj; jeśli brak odpowiedzi — powtarzaj wezwanie. W razie potrzeby użyj race/rakiety i EPIRB."]},
{id:"pozar", cat:"ratownictwo", title:"Pożar na jachcie", intro:"Reaguj natychmiast: odetnij dopływ paliwa/energii i tlenu do ognia. Każdy na pokładzie powinien wiedzieć, gdzie są gaśnice i koc gaśniczy.",
 steps:["Alarm dla załogi; w miarę możliwości ustaw jacht tak, by płomienie i dym szły za burtę (z wiatrem od załogi).","Odetnij źródło: zakręć gaz (butla), wyłącz silnik, odłącz akumulator / instalację elektryczną.","Pożar silnika: NIE otwieraj szeroko luku (dopływ tlenu wzmaga ogień) — gaś przez mały otwór gaśnicą (proszek/CO2/gaz).","Pożar tłuszczu/elektryki: NIE gaś wodą — użyj gaśnicy lub koca gaśniczego.","Po ugaszeniu obserwuj miejsce (ryzyko ponownego zapłonu); chłodź rozgrzane elementy.","Jeśli pożar jest poza kontrolą — wezwij MAYDAY i przygotuj tratwę/środki ratunkowe.","Opatrz ewentualne oparzenia (chłodzenie czystą wodą, jałowy opatrunek), zabezpiecz przed wstrząsem."]},
{id:"hipotermia", cat:"ratownictwo", title:"Hipotermia i RKO", intro:"Wychłodzenie organizmu jest na morzu częstsze niż się wydaje. Postępuj delikatnie i zapobiegaj dalszej utracie ciepła; przy braku oddechu rozpocznij RKO.",

   Suma = 75. Wagi są PROPOZYCJĄ odzwierciedlającą typowy rozkład
   bloków w egzaminie PZŻ (MPZZM/COLREG i nawigacja najliczniejsze).
   Każdy egzamin to świeże, losowe próbkowanie z bazy wg tych wag -> w praktyce
   nieograniczona liczba różnych arkuszy. */
const EXAM_BLUEPRINT = {przepisy:14, nawigacja:12, budowa:10, locja:9, meteo:8, ratownictwo:8, teoria:7, manewry:7};

/* ---- localStorage ---- */
const LS = {
  get(k,d){ try{ const v=localStorage.getItem(k); return v==null?d:JSON.parse(v);}catch(e){return d;} },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
};
const K = {wrong:'jsm_wrong', stats:'jsm_stats', examBest:'jsm_exam_best', examHist:'jsm_exam_hist', known:'jsm_flash_known', prac:'jsm_practical', streak:'jsm_streak'};

/* ---- narzędzia ---- */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function byCat(c){ return QUESTIONS.filter(q=>q.cat===c); }
function qById(id){ return QUESTIONS.find(q=>q.id===id); }
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function pct(n,d){ return d>0?Math.round(100*n/d):0; }
function fmtTime(s){ const m=Math.floor(s/60), x=s%60; return (m<10?'0':'')+m+':'+(x<10?'0':'')+x; }
const LETTERS=['A','B','C','D'];
const $ = sel => document.querySelector(sel);

/* ---- statystyki / błędy ---- */
function getStats(){ return LS.get(K.stats, {}); }
function recordAnswer(cat, correct){
  const s=getStats(); if(!s[cat]) s[cat]={seen:0,correct:0};
  s[cat].seen++; if(correct) s[cat].correct++; LS.set(K.stats,s);
}
function totalStats(){ const s=getStats(); let seen=0,cor=0; for(const k in s){ seen+=s[k].seen; cor+=s[k].correct; } return {seen,cor}; }
function getWrong(){ return LS.get(K.wrong, []); }
function addWrong(id){ const w=getWrong(); if(!w.includes(id)){ w.push(id); LS.set(K.wrong,w); } updateBadges(); }
function removeWrong(id){ let w=getWrong(); w=w.filter(x=>x!==id); LS.set(K.wrong,w); updateBadges(); }
function clearWrong(){ LS.set(K.wrong,[]); updateBadges(); }

/* ---- seria dni (streak) ---- */
function touchStreak(){
  const t=new Date(); const today=t.toISOString().slice(0,10);
  const st=LS.get(K.streak,{last:null,days:0});
  if(st.last===today){ return st.days; }
  const y=new Date(t.getTime()-86400000).toISOString().slice(0,10);
  st.days = (st.last===y) ? (st.days+1) : 1;
  st.last=today; LS.set(K.streak,st); return st.days;
}
function updateBadges(){
  const w=getWrong().length;
  const wd=$('#wrongDot'); if(wd){ wd.textContent=w; wd.style.display = w>0?'inline-block':'none'; }
  const sb=$('#streakN'); if(sb){ sb.textContent=getKnown().length; }
}

/* ---- przełączanie widoków ---- */
const RENDER = {}; // wypełniane niżej
let CURRENT_VIEW='start';
function show(view, arg){
  CURRENT_VIEW=view;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const sec=$('#view-'+view); if(sec) sec.classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>{
    const on = t.getAttribute('data-view')===view;
    t.classList.toggle('active', on); t.setAttribute('aria-selected', on?'true':'false');
  });
  if(RENDER[view]) RENDER[view](arg);
  window.scrollTo({top:0,behavior:'instant'});
}
document.addEventListener('click', e=>{
  const tab=e.target.closest('.tab'); if(tab){ show(tab.getAttribute('data-view')); }
});

let QUIZ=null;
let LAST_TEST={cats:null,count:20};

function startTest(cats, count){
  const pool = shuffle(QUESTIONS.filter(q=>cats.includes(q.cat))).slice(0,count);
  LAST_TEST={cats:cats.slice(), count};
  QUIZ={pool, idx:0, answered:false, correct:0, wrongRound:[], mode:'test', view:'test'};
  show('test','run');
}
function startWrongPractice(){
  const ids=getWrong(); const pool=shuffle(ids.map(qById).filter(Boolean));
  QUIZ={pool, idx:0, answered:false, correct:0, wrongRound:[], mode:'wrong', view:'wrong'};
  show('wrong','run');
}

function quizContainer(){ return $('#view-'+QUIZ.view); }

function renderQuizQuestion(){
  const q=QUIZ.pool[QUIZ.idx]; const n=QUIZ.pool.length;
  const c=quizContainer();
  c.innerHTML = `
    <div class="quizbar">
      <button class="backlink" data-qx>← Zakończ</button>
      <div class="qprog">Pytanie ${QUIZ.idx+1} / ${n} &nbsp;·&nbsp; <span class="catpill" style="--mc:${MOD[q.cat].color}">${MOD[q.cat].icon} ${esc(MOD[q.cat].name)}</span></div>
      <div class="qscore">✓ ${QUIZ.correct}</div>
    </div>
    <div class="card quizcard">
      <div class="qtext">${esc(q.q)}</div>
      <div class="opts">
        ${q.opts.map((o,i)=>`<button class="opt" data-opt="${i}"><span class="lab">${LETTERS[i]}</span><span class="oo">${esc(o)}</span></button>`).join('')}
      </div>
      <div class="explain" id="qexp" hidden></div>
      <div class="qnav"><button class="btn primary" id="qnext" hidden></button></div>
    </div>`;
  c.querySelector('[data-qx]').addEventListener('click', endQuiz);
  c.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>answerQuiz(parseInt(b.getAttribute('data-opt'),10))));
  QUIZ.answered=false;
}

function answerQuiz(choice){
  if(QUIZ.answered) return; QUIZ.answered=true;
  const q=QUIZ.pool[QUIZ.idx]; const c=quizContainer();
  const correct = choice===q.correct;
  const opts=c.querySelectorAll('.opt');
  opts.forEach((b,i)=>{ b.classList.add('done'); if(i===q.correct) b.classList.add('correct'); if(i===choice && !correct) b.classList.add('wrong'); });
  recordAnswer(q.cat, correct);
  if(correct){ QUIZ.correct++; if(QUIZ.mode==='wrong') removeWrong(q.id); }
  else { QUIZ.wrongRound.push(q.id); addWrong(q.id); }
  const exp=c.querySelector('#qexp');
  exp.hidden=false;
  exp.className='explain '+(correct?'ok':'no');
  exp.innerHTML = `<b>${correct?'Dobrze!':'Niepoprawnie.'}</b> Poprawna odpowiedź: <b>${LETTERS[q.correct]}</b>. ${esc(q.exp)}`;
  const next=c.querySelector('#qnext'); next.hidden=false;

let FLASH={cat:'all', onlyUnknown:false, order:[], pos:0, shuffled:false};
function getKnown(){ return LS.get(K.known, []); }
function isKnown(gi){ return getKnown().includes(gi); }
function toggleKnown(gi){ let k=getKnown(); if(k.includes(gi)) k=k.filter(x=>x!==gi); else k.push(gi); LS.set(K.known,k); }
function buildFlashList(){
  let idx=FLASHCARDS.map((f,i)=>i);
  if(FLASH.cat!=='all') idx=idx.filter(i=>FLASHCARDS[i].cat===FLASH.cat);
  if(FLASH.onlyUnknown) idx=idx.filter(i=>!isKnown(i));
  if(FLASH.shuffled) idx=shuffle(idx);
  FLASH.order=idx; if(FLASH.pos>=idx.length) FLASH.pos=0;
}
RENDER.flash = function(cat){

function renderDeck(){
  const d=$('#fDeck'); if(!d) return;
  if(!FLASH.order.length){ d.innerHTML=`<div class="empty"><div class="emoji">✅</div><p>Brak fiszek dla tego wyboru${FLASH.onlyUnknown?' (wszystkie oznaczone jako opanowane)':''}.</p></div>`; return; }

  d.innerHTML=`

function stripTags(h){ return h.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim(); }
function hl(text,q){
  const e=esc(text); if(!q) return e;
  const rx=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
  return e.replace(rx,'<mark>$1</mark>');
}
RENDER.search = function(){
  const v=$('#view-search');
  v.innerHTML=`
    <h1 class="vh">🔍 Szukaj</h1>
    <p class="vsub">Przeszukaj pytania, fiszki i materiały do nauki. Wpisz pojęcie, np. „dewiacja”, „kardynalna”, „MAYDAY”.</p>
    <input type="search" id="sIn" class="searchin" placeholder="Szukaj pojęcia, pytania, definicji…" autocomplete="off">
    <div id="sOut" class="searchout"><p class="hint">Zacznij pisać (min. 2 znaki).</p></div>`;
  const inp=v.querySelector('#sIn'); inp.addEventListener('input',()=>doSearch(inp.value.trim()));
  inp.focus();
};
function doSearch(q){
  const out=$('#sOut'); if(!out) return;
  if(q.length<2){ out.innerHTML='<p class="hint">Zacznij pisać (min. 2 znaki).</p>'; return; }
  const ql=q.toLowerCase();
  const qhits=QUESTIONS.filter(x=> (x.q+' '+x.opts.join(' ')+' '+x.exp).toLowerCase().includes(ql)).slice(0,30);
  const fhits=FLASHCARDS.filter(x=> (x.front+' '+x.back).toLowerCase().includes(ql)).slice(0,30);
  const shits=[];
  for(const id in STUDY){ const txt=stripTags(STUDY[id]); const i=txt.toLowerCase().indexOf(ql); if(i>=0){ const a=Math.max(0,i-60), b=Math.min(txt.length,i+120); shits.push({id, snip:(a>0?'…':'')+txt.slice(a,b)+(b<txt.length?'…':'')}); } }
  let html='';
  if(!qhits.length && !fhits.length && !shits.length){ out.innerHTML=`<div class="empty"><p>Brak wyników dla „${esc(q)}”.</p></div>`; return; }
  if(shits.length){ html+=`<h3 class="sec">Materiały (${shits.length})</h3>`+shits.map(s=>`<button class="sres study" data-mod="${s.id}"><span class="catpill" style="--mc:${MOD[s.id].color}">${MOD[s.id].icon} ${esc(MOD[s.id].name)}</span><span class="snip">${hl(s.snip,q)}</span></button>`).join(''); }
  if(qhits.length){ html+=`<h3 class="sec">Pytania (${qhits.length})</h3>`+qhits.map(x=>`<div class="sres"><div class="srq">${hl(x.q,q)}</div><div class="sra">Odp. <b>${LETTERS[x.correct]}:</b> ${hl(x.opts[x.correct],q)}</div><div class="srx">${hl(x.exp,q)}</div><span class="catpill sm" style="--mc:${MOD[x.cat].color}">${MOD[x.cat].icon} ${esc(MOD[x.cat].name)}</span></div>`).join(''); }
  if(fhits.length){ html+=`<h3 class="sec">Fiszki (${fhits.length})</h3>`+fhits.map(x=>`<div class="sres"><div class="srq">${hl(x.front,q)}</div><div class="sra">${hl(x.back,q)}</div><span class="catpill sm" style="--mc:${MOD[x.cat].color}">${MOD[x.cat].icon} ${esc(MOD[x.cat].name)}</span></div>`).join(''); }
  out.innerHTML=html;
  out.querySelectorAll('[data-mod]').forEach(b=>b.addEventListener('click',()=>show('learn', b.getAttribute('data-mod'))));
}

/* =====================================================================
   EGZAMIN — dynamiczna symulacja (losowanie wg proporcji bloków)
   ===================================================================== */
let EXAM=null;

function generateExam(){
  let pool=[]; const used=new Set();
  for(const cat in EXAM_BLUEPRINT){
    const pick=shuffle(byCat(cat)).slice(0, EXAM_BLUEPRINT[cat]);
    pick.forEach(q=>{ pool.push(q); used.add(q.id); });
  }
  // gdyby z jakiegoś powodu było mniej niż 75 — uzupełnij losowo
  if(pool.length<EXAM_TOTAL){
    const rest=shuffle(QUESTIONS.filter(q=>!used.has(q.id)));
    pool=pool.concat(rest.slice(0, EXAM_TOTAL-pool.length));
  }
  return shuffle(pool).slice(0, EXAM_TOTAL);
}

function startExam(){
  EXAM={pool:generateExam(), idx:0, answers:new Array(EXAM_TOTAL).fill(null), timeLeft:EXAM_TIME, timerId:null, finished:false, started:Date.now()};
  EXAM.timerId=setInterval(examTick,1000);
  show('exam','run');
}
function examTick(){
  if(!EXAM||EXAM.finished) return;
  EXAM.timeLeft--;
  const cl=$('#examClock');
  if(cl){ cl.textContent=fmtTime(Math.max(0,EXAM.timeLeft)); if(EXAM.timeLeft<=300) cl.classList.add('warn'); }
  if(EXAM.timeLeft<=0){ finishExam(true); }
}

function finishExam(timeUp){
  if(!EXAM||EXAM.finished) return;
  EXAM.finished=true; clearInterval(EXAM.timerId);
  let correct=0; const perCat={};
  EXAM.pool.forEach((q,i)=>{
    if(!perCat[q.cat]) perCat[q.cat]={c:0,t:0}; perCat[q.cat].t++;
    const a=EXAM.answers[i]; const ok=a===q.correct;
    if(a!=null){ recordAnswer(q.cat, ok); if(!ok) addWrong(q.id); }
    if(ok){ correct++; perCat[q.cat].c++; }
  });
  const pass=correct>=EXAM_PASS;
  const best=LS.get(K.examBest,null); if(best==null||correct>best) LS.set(K.examBest,correct);
  const hist=LS.get(K.examHist,[]); hist.push({date:new Date().toISOString().slice(0,10), score:correct, pass}); LS.set(K.examHist,hist);
  const used=EXAM_TIME-Math.max(0,EXAM.timeLeft);
  renderExamResult({correct, pass, perCat, used, timeUp});
}
